<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Hukommelsespalads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdf8f3;
      --surface: #ffffff;
      --surface-raised: #fef2e8;
      --accent: #c2440c;        /* Palads terracotta-orange */
      --accent-light: #ea580c;
      --teal: #b4315a;          /* Palads rosa/pink */
      --danger: #991b1b;
      --gold: #d97706;
      --text: #1c1412;
      --muted: #78716c;
      --border: #f0ddd0;
      --shadow: 0 2px 12px rgba(28,20,18,0.07);
      --shadow-lg: 0 6px 28px rgba(28,20,18,0.12);
      --radius: 14px;
      --radius-sm: 9px;
    }

    html { height: 100%; }
    body {
      min-height: 100%;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 15% 0%, rgba(194,68,12,0.06) 0%, transparent 55%),
                        radial-gradient(ellipse at 85% 100%, rgba(180,49,90,0.05) 0%, transparent 55%);
      background-attachment: fixed;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    /* APP BAR */
    #app-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: calc(82px + env(safe-area-inset-top));
      padding-top: env(safe-area-inset-top);
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(28,20,18,0.06);
    }
    .app-title {
      font-family: 'Cinzel', serif;
      font-size: 19px;
      font-weight: 700;
      background: linear-gradient(135deg, #c2440c 0%, #e07060 40%, #db6899 70%, #f0a080 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.04em;
      cursor: pointer;
    }

    /* MAIN */
    #app-root {
      max-width: 720px;
      margin: 0 auto;
      padding: calc(100px + env(safe-area-inset-top)) 16px 40px;
    }

    .view { display: none; }
    .view.active { display: block; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .view.active { animation: fadeSlideIn 0.2s ease-out; }

    /* TYPOGRAPHY */
    h1 { font-family: 'Cinzel', serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    h2 { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    h3 { font-family: 'Cinzel', serif; font-size: 17px; font-weight: 600; }
    .muted { color: var(--muted); font-size: 13px; }

    /* BUTTONS */
    button {
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 18px;
      transition: transform 0.1s, opacity 0.1s, background 0.15s;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-primary { background: linear-gradient(135deg, var(--accent), #9a3208); color: #fff; box-shadow: 0 2px 12px rgba(194,68,12,0.28); }
    .btn-primary:hover { background: linear-gradient(135deg, var(--accent-light), var(--accent)); box-shadow: 0 4px 16px rgba(194,68,12,0.38); }
    .btn-teal { background: linear-gradient(135deg, var(--teal), #8b1a3e); color: #fff; font-weight: 600; box-shadow: 0 2px 10px rgba(180,49,90,0.25); }
    .btn-teal:hover { background: linear-gradient(135deg, #c73d6a, var(--teal)); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(224,92,107,0.5); padding: 7px 14px; }
    .btn-danger:hover { background: rgba(224,92,107,0.1); border-color: var(--danger); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { background: var(--surface-raised); border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-icon { background: transparent; color: var(--muted); padding: 4px 8px; font-size: 16px; border-radius: 6px; }
    .btn-icon:hover { background: var(--surface-raised); color: var(--text); }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    /* FORM ELEMENTS */
    input[type="text"], textarea {
      width: 100%;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
    }
    input[type="text"]::placeholder, textarea::placeholder {
      color: var(--muted);
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .form-group { margin-bottom: 16px; }

    /* DASHBOARD */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .palaces-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .palace-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: border-color 0.25s, transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .palace-card:hover {
      border-color: rgba(194,68,12,0.5);
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg), 0 0 0 1px rgba(194,68,12,0.12);
    }
    .palace-card-badge {
      position: absolute;
      top: 10px; right: 10px;
      background: var(--gold);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }
    .palace-card-name {
      font-family: 'Cinzel', serif;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
      padding-right: 60px;
    }
    .palace-card-desc {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .palace-card-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .palace-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    /* COLLECTION CARDS */
    .collection-card {
      background: var(--surface);
      border: 1px solid rgba(194,68,12,0.18);
      border-radius: var(--radius);
      padding: 20px 22px;
      cursor: pointer;
      transition: border-color 0.25s, transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: flex-start;
      position: relative;
    }
    .collection-card:hover {
      border-color: rgba(194,68,12,0.5);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .collection-card-body { flex: 1; min-width: 0; }
    .collection-card-name {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .collection-card-desc {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .collection-palace-dots {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 8px;
    }
    .collection-palace-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 4px rgba(0,0,0,0.4);
    }
    .collection-card-meta {
      font-size: 12px;
      color: var(--muted);
    }
    .collection-card-auth-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      align-items: flex-start;
      padding-top: 2px;
    }
    .collections-section-title {
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
      margin-bottom: 10px;
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { margin-bottom: 20px; font-size: 15px; }

    /* PALACE DETAIL */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 20px;
      background: none;
      border: none;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }
    .back-btn:hover { color: var(--text); transform: none; }

    .palace-detail-header {
      margin-bottom: 24px;
    }
    .palace-detail-srs {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
    }
    .palace-detail-srs span { display: flex; align-items: center; gap: 5px; }
    .srs-due { color: var(--accent); font-weight: 600; }

    .locations-list { margin-top: 20px; }
    .location-item {
      background: linear-gradient(160deg, var(--surface) 0%, var(--surface-raised) 100%);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .location-item:hover { border-color: rgba(194,68,12,0.4); }
    .location-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      gap: 12px;
    }
    .location-number {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .location-name {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      flex: 1;
    }
    .location-actions { display: flex; gap: 4px; }
    .location-memories {
      padding: 0 16px 14px 52px;
    }
    .memory-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .memory-item:last-child { border-bottom: none; }
    .memory-text { flex: 1; }
    .memory-item .btn-icon { font-size: 13px; padding: 3px 6px; flex-shrink: 0; }

    .add-memory-form {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .add-memory-form input { width: 100%; }

    .add-location-form {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .add-location-form .form-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .add-location-form input { flex: 1; }

    /* RUMKORT */
    .room-map-wrap { padding: 0 10px 10px; }
    .room-map-container {
      position: relative;
      display: inline-block;
      width: 100%;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
      user-select: none;
    }
    .room-map-container.pinning { cursor: crosshair; }
    .room-map-img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
    }
    .map-pin {
      position: absolute;
      transform: translate(-50%, -100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }
    .room-map-container.pinning .map-pin { pointer-events: all; }
    .map-pin-num {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      width: 22px;
      height: 22px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .map-pin-num span { transform: rotate(45deg); display:block; }
    .map-pin-del {
      position: absolute;
      top: -6px;
      right: -8px;
      background: var(--danger);
      border: none;
      color: #fff;
      font-size: 9px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
    }
    .room-map-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 2px 2px;
      font-size: 13px;
    }
    .map-hint { flex: 1; color: var(--muted); }
    .map-hint strong { color: var(--text); }

    /* TRIVIA CARDS */
    .trivia-card {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-bottom: 8px;
    }
    .trivia-q {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .trivia-a {
      font-size: 14px;
      color: var(--teal);
      padding-left: 10px;
      border-left: 2px solid var(--teal);
      margin-bottom: 4px;
    }
    .trivia-m {
      font-size: 12px;
      color: var(--muted);
      padding-left: 10px;
    }

    /* FRIE ERINDRINGER */
    .room-notes-divider {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 8px 0 4px;
      border-top: 1px solid var(--border);
      margin-top: 6px;
    }

    /* ROOMS */
    .room-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .room-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface-raised);
      border-bottom: 1px solid var(--border);
    }
    .room-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--accent-light);
    }
    .room-locations {
      padding: 8px 10px;
    }
    .room-locations .location-item {
      margin-bottom: 8px;
    }
    .room-select {
      font-size: 12px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      padding: 2px 4px;
      cursor: pointer;
      max-width: 110px;
    }
    .room-select:focus { outline: none; border-color: var(--accent); }

    /* REVIEW SESSION */
    .review-progress {
      height: 4px;
      background: var(--surface-raised);
      border-radius: 2px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .review-progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .review-card {
      perspective: 1000px;
      margin-bottom: 24px;
      height: calc(100vh - 280px);
      min-height: 300px;
      max-height: 600px;
    }
    .review-card-inner {
      position: relative;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.5s ease;
    }
    .review-card-inner.flipped { transform: rotateY(180deg); }

    .review-card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 36px;
      text-align: center;
      box-shadow: var(--shadow-lg);
      overflow-y: auto;
    }
    .review-card-back {
      transform: rotateY(180deg);
      align-items: flex-start;
      justify-content: flex-start;
      text-align: left;
      padding: 32px 36px;
      background: var(--surface-raised);
    }

    .review-loc-number {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }
    .review-loc-name {
      font-family: 'Cinzel', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
    }
    .review-tap-hint {
      color: var(--muted);
      font-size: 13px;
    }

    .review-memories-list {
      width: 100%;
    }
    .review-memories-list.size-lg  { font-size: 20px; }
    .review-memories-list.size-md  { font-size: 17px; }
    .review-memories-list.size-sm  { font-size: 14px; }
    .review-memories-list.size-xs  { font-size: 12px; }
    .review-memory-item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(226,232,240,0.8);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      line-height: 1.5;
    }
    .review-memory-item:last-child { border-bottom: none; }
    .review-memory-dot {
      width: 7px; height: 7px;
      background: var(--teal);
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.45em;
    }
    .review-back-label {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.7;
    }

    .review-nav {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    /* PALACE EDITOR */
    .editor-header { margin-bottom: 28px; }

    /* REVIEW SUMMARY */
    .review-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
      margin-bottom: 20px;
    }
    .review-summary h2 { margin-bottom: 8px; }
    .review-summary .next-date {
      font-size: 18px;
      color: var(--teal);
      font-weight: 600;
      margin: 16px 0 8px;
    }

    /* INLINE EDIT */
    .inline-edit-form {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      padding: 10px 0 4px;
    }
    .inline-edit-form input { flex: 1; }

    /* UTILS */
    .flex { display: flex; }
    .gap-8 { gap: 8px; }
    .gap-12 { gap: 12px; }
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }
    .mb-8 { margin-bottom: 8px; }
    .text-center { text-align: center; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* MOBILE / TOUCH */
    button, [data-action] {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* iOS: forhindrer auto-zoom på inputs (kræver font-size >= 16px) */
    @media (max-width: 480px) {
      input, textarea, select { font-size: 16px !important; }
    }

    @media (max-width: 480px) {
      /* App bar: behold safe-area top-padding, tilføj sidepadding */
      #app-bar { padding-left: 10px; padding-right: 10px; gap: 6px; }
      .app-title { font-size: 15px; letter-spacing: 0; }

      /* Indhold: top-padding matcher app-bar højde inkl. safe-area */
      #app-root { padding-left: 10px; padding-right: 10px; }

      /* Typografi */
      h1 { font-size: 22px; }
      h2 { font-size: 18px; }

      /* Dashboard-grid: altid én kolonne */
      .palaces-grid { grid-template-columns: 1fr; }
      .palace-card { padding: 16px; }
      .palace-card-actions { flex-wrap: wrap; gap: 6px; }
      .collection-card { padding: 14px; }

      /* Touch targets: større ikonknapper */
      .btn-icon { padding: 8px 10px; font-size: 16px; }
      .btn-sm { padding: 7px 12px; font-size: 13px; }

      /* Review-kort: kompakt højde */
      .review-card { height: min(42vh, 340px); min-height: 220px; margin-bottom: 16px; }
      .review-card-face { padding: 20px 16px; }
      .review-card-back { padding: 16px; }
      .review-loc-name { font-size: 22px; margin-bottom: 10px; }

      /* Peg-liste: håndteres i separat media query efter desktop-reglerne */

      /* Location-header: undgå overflow */
      .location-header { padding: 12px 10px; gap: 8px; }
      .location-actions { gap: 2px; }

      /* Rum-knapper: lidt mere luft */
      .room-header { padding: 10px 10px; }
    }

    /* Safe-area padding til bund (iPhone home bar) */
    #app-root { padding-bottom: max(40px, env(safe-area-inset-bottom)); }

    /* Peg-overlay: mørkt lag bag bottom sheet, klik for at lukke */
    #peg-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 149;
      background: rgba(0,0,0,0.45);
    }
    #peg-overlay.visible { display: block; }

    /* PEG SIDEBAR */
    #peg-sidebar {
      position: fixed;
      top: 60px;
      right: 0;
      bottom: 0;
      width: 320px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 150;
    }
    #peg-sidebar.open { transform: translateX(0); }
    #peg-sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--accent-light);
      flex-shrink: 0;
    }
    #peg-sidebar-header button {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }
    #peg-sidebar-list {
      overflow-y: auto;
      flex: 1;
      padding: 4px 6px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(25, auto);
      grid-auto-flow: column;
      align-content: start;
      gap: 1px;
    }
    .peg-row {
      display: flex;
      gap: 5px;
      align-items: baseline;
      padding: 2px 4px;
      border-radius: 4px;
    }
    .peg-row:hover { background: var(--surface-raised); }
    .peg-num {
      font-family: 'Cinzel', serif;
      color: var(--accent-light);
      font-size: 11px;
      min-width: 18px;
      flex-shrink: 0;
    }
    .peg-word { color: var(--text); font-size: 12px; line-height: 1.4; }
    .peg-edit-input {
      width: 100%;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 12px;
      padding: 1px 4px;
    }
    .peg-edit-input:focus { outline: none; border-color: var(--accent); }
    #peg-toggle-btn.active {
      background: var(--surface-raised);
      color: var(--accent-light);
      border-color: var(--accent);
    }

    /* PEG SIDEBAR: mobil bottom-sheet — skal stå EFTER desktop-reglerne */
    @media (max-width: 480px) {
      #peg-sidebar {
        top: auto !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        width: 100% !important;
        height: 62vh !important;
        transform: translateY(100%) !important;
        border-left: none;
        border-top: 1px solid var(--border);
        border-radius: 16px 16px 0 0;
      }
      #peg-sidebar.open { transform: translateY(0) !important; }
    }
  </style>
</head>

  function buildHistoryPalace(fromYear, toYear, label) {
    const now = Date.now();
    const byYear = new Map();
    for (const [yr, type, text] of HISTORY_PALACE_DATA) {
      if (!byYear.has(yr)) byYear.set(yr, []);

      { name: '1851–1875', from: 1851, to: 1875 },

    ];
    const rooms = quarterDefs.map(q => ({ id: genId(), name: q.name, notes: [] }));
    const locations = [];
    for (let year = fromYear; year <= toYear; year++) {
      const entries = byYear.get(year) || [];
      const memories = [];

        const t = e.type === 'M' ? '\uD83E\uDDE0 ' + e.text : e.text;
        memories.push({ id: genId(), text: t, createdAt: now });
      }
      const roomIdx = quarterDefs.findIndex(q => year >= q.from && year <= q.to);
      const roomId = roomIdx !== -1 ? rooms[roomIdx].id : null;
      locations.push({ id: genId(), order: year - fromYear, name: String(year), memories, roomId });
    }

      id: genId(),
      name: label,
      description: 'Løberute langs stranden – historiske begivenheder fra 1800-tallet',

    if (days <= 0) return 'I dag';
    if (days === 1) return 'I morgen';
    return `Om ${days} dage`;
  }

    if (!srs || !srs.lastReviewDate) return '#94a3b8';
    const total = srs.nextReviewDate - srs.lastReviewDate;
    if (total <= 0) return '#dc2626';
    const ratio = (Date.now() - srs.lastReviewDate) / total;
    const clamped = Math.max(0, Math.min(1.5, ratio));
    const hue = Math.round(120 - (clamped / 1.5) * 120);

    const p = getPalace(id);
    if (!p) return;
    Object.assign(p, fields, { updatedAt: Date.now() });
    saveData();
  }

  function deletePalace(id) {
    data.palaces = data.palaces.filter(p => p.id !== id);
    saveData();
  }

  // ── SAMLINGER ──────────────────────────────────────────────────────
  function getCollection(id) { return data.collections.find(f => f.id === id); }
  function createCollection(name, desc) {
    const f = { id: genId(), name: name.trim(), description: (desc || '').trim(), createdAt: Date.now() };
    data.collections.push(f);
    saveData();
    return f;
  }
  function updateCollection(id, fields) {
    const f = getCollection(id);
    if (!f) return;
    Object.assign(f, fields, { updatedAt: Date.now() });
    saveData();
  }
  function deleteCollection(id) {
    data.collections = data.collections.filter(f => f.id !== id);
    data.palaces.forEach(p => { if (p.collectionId === id) delete p.collectionId; });
    saveData();
  }

  function getPalace(id) {
    return data.palaces.find(p => p.id === id);
  }

  // ── RUMKORT CRUD ───────────────────────────────────────────────────
  function setRoomMap(palaceId, roomId, dataUrl) {
    const room = getRoom(palaceId, roomId);
    if (room) { room.mapImage = dataUrl; saveData(); }
  }

  function removeRoomMap(palaceId, roomId) {
    const room = getRoom(palaceId, roomId);
    if (!room) return;
    delete room.mapImage;
    // clear all pins in this room
    const p = getPalace(palaceId);
    p.locations.filter(l => l.roomId === roomId).forEach(l => delete l.pin);
    saveData();
  }

  function setLocationPin(palaceId, locId, x, y) {
    const loc = getLoc(palaceId, locId);
    if (loc) { loc.pin = { x, y }; saveData(); }
  }

  function removeLocationPin(palaceId, locId) {
    const loc = getLoc(palaceId, locId);
    if (loc) { delete loc.pin; saveData(); }
  }

  // ── FRIE ERINDRINGER CRUD ──────────────────────────────────────────
  function getRoom(palaceId, roomId) {
    const p = getPalace(palaceId);
    return p && p.rooms ? p.rooms.find(r => r.id === roomId) : null;
  }

  function addNote(palaceId, roomId, text, mnemonic) {
    const room = getRoom(palaceId, roomId);
    if (!room) return;
    if (!room.notes) room.notes = [];
    const now = Date.now();
    room.notes.push({ id: genId(), text: text.trim(), createdAt: now });
    if (mnemonic && mnemonic.trim()) {
      room.notes.push({ id: genId(), text: '🧠 ' + mnemonic.trim(), createdAt: now });
    }
    saveData();
  }

  function updateNote(palaceId, roomId, noteId, text) {
    const room = getRoom(palaceId, roomId);
    if (!room || !room.notes) return;
    const note = room.notes.find(n => n.id === noteId);
    if (note) { note.text = text.trim(); saveData(); }
  }

  function deleteNote(palaceId, roomId, noteId) {
    const room = getRoom(palaceId, roomId);
    if (!room || !room.notes) return;
    room.notes = room.notes.filter(n => n.id !== noteId);
    saveData();
  }

  // ── RUM CRUD ───────────────────────────────────────────────────────
  function addRoom(palaceId, name) {
    const p = getPalace(palaceId);
    if (!p) return null;
    if (!p.rooms) p.rooms = [];
    const room = { id: genId(), name: name.trim() };
    p.rooms.push(room);
    saveData();
    return room;
  }

  function renameRoom(palaceId, roomId, name) {
    const p = getPalace(palaceId);
    if (!p || !p.rooms) return;
    const r = p.rooms.find(r => r.id === roomId);
    if (r) { r.name = name.trim(); saveData(); }
  }

  function deleteRoom(palaceId, roomId) {
    const p = getPalace(palaceId);
    if (!p || !p.rooms) return;
    p.rooms = p.rooms.filter(r => r.id !== roomId);
    // unassign locations that belonged to this room
    p.locations.forEach(l => { if (l.roomId === roomId) delete l.roomId; });
    saveData();
  }

  function assignLocRoom(palaceId, locId, roomId) {
    const loc = getLoc(palaceId, locId);
    if (!loc) return;
    if (roomId) loc.roomId = roomId;
    else delete loc.roomId;
    saveData();
  }

  function getRoomName(p, roomId) {
    if (!p.rooms) return '';
    const r = p.rooms.find(r => r.id === roomId);
    return r ? r.name : '';
  }

  function getReviewLocs(p) {
    if (app.reviewRoomId) {
      return p.locations.filter(l => l.roomId === app.reviewRoomId);
    }
    const start = app.reviewLocStart;
    const end = app.reviewLocEnd !== null ? app.reviewLocEnd : p.locations.length;
    return p.locations.slice(start, end);
  }

  // ── STED CRUD ──────────────────────────────────────────────────────
  function addLocation(palaceId, name, roomId) {
    const p = getPalace(palaceId);
    if (!p) return null;
    const loc = { id: genId(), order: p.locations.length, name: name.trim(), memories: [] };
    if (roomId) loc.roomId = roomId;
    p.locations.push(loc);
    saveData();
    return loc;
  }

  function addTriviaCard(palaceId, roomId, question, answer, mnemonic) {
    const p = getPalace(palaceId);
    if (!p) return;
    const loc = { id: genId(), order: p.locations.length, name: question.trim(), memories: [] };
    if (roomId) loc.roomId = roomId;
    const now = Date.now();
    if (answer && answer.trim()) loc.memories.push({ id: genId(), text: answer.trim(), createdAt: now });
    if (mnemonic && mnemonic.trim()) loc.memories.push({ id: genId(), text: '🧠 ' + mnemonic.trim(), createdAt: now });
    p.locations.push(loc);
    saveData();
  }

  function updateTriviaCard(palaceId, locId, question, answer, mnemonic) {
    const loc = getLoc(palaceId, locId);
    if (!loc) return;
    loc.name = question.trim();
    const answerEntry = loc.memories.find(m => !m.text.startsWith('🧠'));
    const mnemonicEntry = loc.memories.find(m => m.text.startsWith('🧠'));
    if (answerEntry) answerEntry.text = answer.trim();
    else if (answer && answer.trim()) loc.memories.unshift({ id: genId(), text: answer.trim(), createdAt: Date.now() });
    if (mnemonicEntry) mnemonicEntry.text = '🧠 ' + mnemonic.trim();
    else if (mnemonic && mnemonic.trim()) loc.memories.push({ id: genId(), text: '🧠 ' + mnemonic.trim(), createdAt: Date.now() });
    saveData();
  }

  function updateLocation(palaceId, locId, name) {
    const loc = getLoc(palaceId, locId);
    if (!loc) return;
    loc.name = name.trim();
    saveData();
  }

  function deleteLocation(palaceId, locId) {
    const p = getPalace(palaceId);
    if (!p) return;
    p.locations = p.locations.filter(l => l.id !== locId);
    p.locations.forEach((l, i) => l.order = i);
    saveData();
  }

  function moveLocation(palaceId, locId, dir) {
    const p = getPalace(palaceId);
    if (!p) return;
    const idx = p.locations.findIndex(l => l.id === locId);
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= p.locations.length) return;
    [p.locations[idx], p.locations[newIdx]] = [p.locations[newIdx], p.locations[idx]];
    p.locations.forEach((l, i) => l.order = i);
    saveData();
  }

  function getLoc(palaceId, locId) {
    const p = getPalace(palaceId);
    return p ? p.locations.find(l => l.id === locId) : null;
  }

  // ── ERINDRING CRUD ─────────────────────────────────────────────────
  function addMemory(palaceId, locId, text, mnemonic) {
    const loc = getLoc(palaceId, locId);
    if (!loc) return;
    const now = Date.now();
    loc.memories.push({ id: genId(), text: text.trim(), createdAt: now });
    if (mnemonic && mnemonic.trim()) {
      loc.memories.push({ id: genId(), text: '🧠 ' + mnemonic.trim(), createdAt: now });
    }
    saveData();
  }

  function updateMemory(palaceId, locId, memId, text) {
    const loc = getLoc(palaceId, locId);
    if (!loc) return;
    const mem = loc.memories.find(m => m.id === memId);
    if (mem) { mem.text = text.trim(); saveData(); }
  }

  function deleteMemory(palaceId, locId, memId) {
    const loc = getLoc(palaceId, locId);
    if (!loc) return;
    loc.memories = loc.memories.filter(m => m.id !== memId);
    saveData();
  }

  // ── VISNINGER ──────────────────────────────────────────────────────
  function renderView(view) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    app.view = view;
    updateDueBadge();

    switch (view) {
      case 'dashboard': renderDashboard(); break;
      case 'palace-editor': renderPalaceEditor(); break;
      case 'palace-detail': renderPalaceDetail(); break;
      case 'collection-detail': renderCollectionDetail(); break;
      case 'collection-editor': renderCollectionEditor(); break;
      case 'review-session': renderReviewSession(); break;
    }
  }

  function showView(id) {
    document.getElementById(id).classList.add('active');
  }

  function updateDueBadge() {
    // no-op — badges are now rendered per palace card
    if (false) {
    }
  }

  // OVERSIGT
  function renderDashboard() {
    const el = document.getElementById('view-dashboard');

    const q = app.searchQuery.toLowerCase().trim();

    // Filter palaces (search mode: show all matches flat, no folders)
    const allPalaces = data.palaces;
    const filtered = q ? allPalaces.filter(p =>
      p.name.toLowerCase().includes(q) ||
      (p.description || '').toLowerCase().includes(q) ||
      p.locations.some(l => l.name.toLowerCase().includes(q) ||
        l.memories.some(m => m.text.toLowerCase().includes(q)))
    ) : null;

    let html = `
      <div class="section-header">
        <h1>Dine Paladser</h1>
        <div style="display:flex;gap:8px;align-items:center">
          ${app.authenticated ? `<button class="btn-ghost" data-action="new-collection">+ Ny Samling</button>` : ''}
          ${app.authenticated ? `<button class="btn-primary" data-action="new-palace">+ Nyt Palads</button>` : ''}
        </div>
      </div>
      <div style="margin-bottom:20px;">
        <input type="text" id="search-input" placeholder="&#128269; Søg i paladser og erindringer..."
          value="${esc(app.searchQuery)}" oninput="searchPalaces(this.value)"
          style="width:100%;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;padding:10px 14px;outline:none;transition:border-color 0.2s;"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
      </div>`;

    if (allPalaces.length === 0 && data.collections.length === 0) {
      html += `
        <div class="empty-state">
          <div class="empty-icon">&#127963;</div>
          <p>Ingen hukommelsespaladser endnu.<br>Opret dit første for at komme i gang.</p>
          ${app.authenticated ? `<button class="btn-primary" data-action="new-palace">Opret Palads</button>` : ''}
        </div>`;
    } else if (q && filtered.length === 0) {
      html += `<p style="color:var(--muted);text-align:center;padding:40px 0;">Ingen resultater for "${esc(q)}"</p>`;
    } else if (q) {
      // Search mode: flat list
      html += `<div class="palaces-grid">` + filtered.map(p => palaceCardHtml(p, q)).join('') + `</div>`;
    } else {
      // Normal mode: collections + ungrouped
      if (data.collections.length > 0) {
        html += `<div class="collections-section-title">Samlinger</div><div class="palaces-grid" style="margin-bottom:28px;">`;
        for (const f of data.collections) {
          const fps = allPalaces.filter(p => p.collectionId === f.id);
          // Collection accent color = worst SRS color in collection
          const worstRatio = fps.reduce((worst, p) => {
            if (!p.srs || !p.srs.lastReviewDate) return Math.max(worst, 1.5);
            const total = p.srs.nextReviewDate - p.srs.lastReviewDate;
            if (total <= 0) return Math.max(worst, 1.5);
            return Math.max(worst, (Date.now() - p.srs.lastReviewDate) / total);
          }, 0);
          const worstClamped = Math.max(0, Math.min(1.5, worstRatio));
          const accentHue = Math.round(120 - (worstClamped / 1.5) * 120);
          const accentColor = fps.length > 0 ? `hsl(${accentHue}, 70%, 38%)` : 'hsl(0,0%,35%)';
          const palaceChips = fps.length > 0
            ? fps.map(p => `
                <div style="display:inline-flex;align-items:center;gap:5px;background:var(--surface-raised);border-radius:20px;padding:3px 10px 3px 7px;font-size:12px;color:var(--text);">
                  <div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${srsColor(p.srs)};box-shadow:0 0 4px ${srsColor(p.srs)};"></div>
                  ${esc(p.name)}
                </div>`).join('')
            : `<span style="color:var(--muted);font-size:12px;font-style:italic;">Ingen paladser endnu</span>`;
          html += `
            <div class="collection-card" data-action="open-collection" data-collection-id="${f.id}" style="border-left: 5px solid ${accentColor};">
              <div class="collection-card-body">
                <div class="collection-card-name">${esc(f.name)}</div>
                <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;">${palaceChips}</div>
              </div>
              ${app.authenticated ? `
              <div class="collection-card-auth-actions" onclick="event.stopPropagation()">
                <button class="btn-ghost btn-sm" data-action="edit-collection" data-collection-id="${f.id}">&#9998;</button>
                <button class="btn-danger btn-sm" data-action="delete-collection" data-collection-id="${f.id}">&#128465;</button>
              </div>` : ''}
            </div>`;
        }
        html += `</div>`;
      }

      const ungrouped = allPalaces.filter(p => !p.collectionId);
      if (ungrouped.length > 0) {
        if (data.collections.length > 0) html += `<div class="collections-section-title">Løse Paladser</div>`;
        const due = ungrouped.filter(isDue);
        const rest = ungrouped.filter(p => !isDue(p));
        html += `<div class="palaces-grid">` + [...due, ...rest].map(p => palaceCardHtml(p, '')).join('') + `</div>`;
      }
    }

    el.innerHTML = html;
    showView('view-dashboard');
  }

  function palaceCardHtml(p, q) {
    const locCount = p.locations.length;
    const memCount = p.locations.reduce((s, l) => s + l.memories.length, 0);
    const daysSince = p.srs && p.srs.lastReviewDate
      ? Math.floor((Date.now() - p.srs.lastReviewDate) / 86400000)
      : null;
    const showBadge = daysSince === null || daysSince >= (data.settings.reviewIntervalDays || 30);
    const badgeText = daysSince === null ? 'Aldrig øvet' : `${daysSince} dag${daysSince !== 1 ? 'e' : ''} siden`;
    const reviewed = p.srs && p.srs.lastReviewDate;
    const dotColor = srsColor(p.srs);
    return `
      <div class="palace-card" data-palace-id="${p.id}">
        ${showBadge ? `<span class="palace-card-badge">${badgeText}</span>` : ''}
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <div style="width:12px;height:12px;border-radius:50%;background:${dotColor};flex-shrink:0;box-shadow:0 0 5px ${dotColor};"></div>
          <div class="palace-card-name" style="margin-bottom:0;padding-right:${showBadge?'60px':'0'}">${esc(p.name)}${p.type === 'trivia' ? ' <span style="font-size:11px;background:var(--surface-raised);border:1px solid var(--border);border-radius:4px;padding:1px 6px;vertical-align:middle;color:var(--muted)">Trivia</span>' : ''}</div>
        </div>
        <div class="palace-card-desc">${esc(p.description) || '<em style="color:var(--muted)">Ingen beskrivelse</em>'}</div>
        <div class="palace-card-meta">
          <span>&#128205; ${locCount} ${locCount !== 1 ? 'steder' : 'sted'}</span>
          <span>&#128214; ${memCount} ${memCount !== 1 ? 'erindringer' : 'erindring'}</span>
          <span>&#128197; ${reviewed ? 'Sidst: ' + formatDate(p.srs.lastReviewDate) : 'Aldrig gennemgået'}</span>
        </div>
        <div class="palace-card-actions">
          <button class="btn-teal btn-sm" data-action="choose-review" data-palace-id="${p.id}">&#9654; Gennemgå</button>
          <button class="btn-ghost btn-sm" data-action="view-palace" data-palace-id="${p.id}">&#128065; Se</button>
          ${app.authenticated ? `
            <button class="btn-ghost btn-sm" data-action="edit-palace" data-palace-id="${p.id}">&#9998; Rediger</button>
            <button class="btn-danger btn-sm" data-action="delete-palace" data-palace-id="${p.id}">&#128465;</button>
          ` : ''}
        </div>
        ${q ? (() => {
          const hits = p.locations.filter(l =>
            l.name.toLowerCase().includes(q) ||
            l.memories.some(m => m.text.toLowerCase().includes(q))
          ).slice(0, 4);
          if (!hits.length) return '';
          return '<div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px;">' +
            hits.map(l => '<div style="font-size:12px;color:var(--muted);padding:2px 0;">' +
              '<span style="color:var(--accent-light)">&#128205; ' + esc(l.name) + '</span>' +
              l.memories.filter(m => m.text.toLowerCase().includes(q)).slice(0,2).map(m =>
                '<span style="display:block;padding-left:12px;color:var(--text);opacity:0.7;">' + escLines(m.text) + '</span>'
              ).join('') +
            '</div>').join('') +
          '</div>';
        })() : ''}
      </div>`;
  }

  // PALADS-DETALJER
  function renderPalaceDetail() {
    const el = document.getElementById('view-palace-detail');
    const p = getPalace(app.editingPalaceId);
    if (!p) { renderView('dashboard'); return; }

    const due = isDue(p);
    const nextStr = p.srs && p.srs.lastReviewDate
      ? daysUntil(p.srs.nextReviewDate)
      : 'Nu';

    let html = `
      <button class="back-btn" data-action="${p.collectionId ? 'back-to-collection' : 'go-dashboard'}">&#8592; ${p.collectionId && getCollection(p.collectionId) ? esc(getCollection(p.collectionId).name) : 'Alle Paladser'}</button>
      <div class="palace-detail-header">
        <div class="flex" style="justify-content:space-between;align-items:flex-start;gap:12px;">
          <div>
            <h1>${esc(p.name)}</h1>
            <p class="muted">${esc(p.description)}</p>
          </div>
          <button class="btn-teal" data-action="start-review" data-palace-id="${p.id}">&#9654; Gennemgå</button>
        </div>
        <div class="palace-detail-srs">
          <span>&#128336; Næste gennemgang: <span class="${due ? 'srs-due' : ''}">${nextStr}</span></span>
          ${p.srs && p.srs.lastReviewDate ? `<span>&#10003; Sidst gennemgået: ${formatDate(p.srs.lastReviewDate)}</span>` : ''}
          <span>&#127381; Interval: ${p.srs ? p.srs.interval : 1} dag${(p.srs && p.srs.interval !== 1) ? 'e' : ''}</span>
        </div>
      </div>

      <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:10px;margin-top:18px;">
        <h2 style="font-size:16px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;">Rum (${(p.rooms||[]).length})</h2>
        <button class="btn-ghost btn-sm" data-action="show-add-room" data-palace-id="${p.id}">+ Nyt Rum</button>
      </div>
      <div id="add-room-area"></div>`;

    const rooms = p.rooms || [];
    rooms.forEach(room => {
      const roomLocs = p.locations.filter(l => l.roomId === room.id);
      const isEditingRoom = app.editingRoomId === room.id;
      const isCollapsed = app.collapsedRooms.has(room.id);
      html += `<div class="room-section">
        <div class="room-header" style="${isCollapsed ? 'border-bottom:none;' : ''}">`;
      if (isEditingRoom) {
        html += `<input type="text" id="edit-room-name-${room.id}" value="${esc(room.name)}" style="flex:1;background:var(--surface-raised);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);">
          <button class="btn-primary btn-sm" data-action="save-room-edit" data-palace-id="${p.id}" data-room-id="${room.id}">Gem</button>
          <button class="btn-ghost btn-sm" data-action="cancel-room-edit">Annuller</button>`;
      } else {
        html += `<button class="btn-icon" data-action="toggle-room-collapse" data-room-id="${room.id}" title="${isCollapsed ? 'Udvid' : 'Minimer'}" style="font-size:10px;padding:2px 4px;">${isCollapsed ? '&#9654;' : '&#9660;'}</button>
          <span class="room-name">${esc(room.name)}</span>
          <div style="display:flex;gap:6px;align-items:center;margin-left:auto;">
            <button class="btn-ghost btn-sm" data-action="start-review" data-palace-id="${p.id}" data-room-id="${room.id}">&#9654; Øv rum</button>
            <button class="btn-icon" data-action="edit-room" data-palace-id="${p.id}" data-room-id="${room.id}" title="Omdøb">&#9998;</button>
            <button class="btn-icon" data-action="delete-room" data-palace-id="${p.id}" data-room-id="${room.id}" title="Slet rum" style="color:var(--danger)">&#128465;</button>
          </div>`;
      }
      html += `</div>`;
      if (isCollapsed) { html += `</div>`; return; }

      // ── RUMKORT ──
      if (room.mapImage) {
        const isPinning = app.pinningRoomId === room.id;
        const nextUnpinned = roomLocs.find(l => !l.pin);
        html += `<div class="room-map-wrap">
          <div class="room-map-container${isPinning ? ' pinning' : ''}"
               onclick="handleMapClick(event,'${p.id}','${room.id}')"
               id="map-${room.id}">
            <img src="${room.mapImage}" class="room-map-img" draggable="false">`;
        roomLocs.forEach((loc, i) => {
          if (!loc.pin) return;
          html += `<div class="map-pin" style="left:${loc.pin.x}%;top:${loc.pin.y}%;" title="${esc(loc.name)}">
            <div class="map-pin-num"><span>${i + 1}</span></div>
            ${isPinning ? `<button class="map-pin-del" onclick="event.stopPropagation();deletePinFromLoc('${p.id}','${loc.id}')" title="Fjern pin">✕</button>` : ''}
          </div>`;
        });
        html += `</div>
          <div class="room-map-toolbar">
            ${isPinning
              ? `<span class="map-hint">${nextUnpinned ? `Klik for at placere: <strong>${esc(nextUnpinned.name)}</strong>` : '✓ Alle pins placeret'}</span>
                 <button class="btn-primary btn-sm" onclick="exitPinMode()">Færdig</button>`
              : `<button class="btn-ghost btn-sm" onclick="enterPinMode('${room.id}')">&#128204; Placer Pins</button>
                 <button class="btn-ghost btn-sm" onclick="removeMapConfirm('${p.id}','${room.id}')" style="color:var(--muted);">Fjern Kort</button>`
            }
          </div>
        </div>`;
      } else {
        html += `<div style="padding:6px 14px 2px;">
          <label class="btn-ghost btn-sm" style="cursor:pointer;">
            &#128247; Upload Kort
            <input type="file" accept="image/*" style="display:none" onchange="handleMapUpload(event,'${p.id}','${room.id}')">
          </label>
        </div>`;
      }

      html += `<div class="room-locations">`;
      if (p.type === 'trivia') {
        roomLocs.forEach(loc => { html += renderTriviaCardHTML(p.id, loc); });
        html += `<div style="padding:6px 0 2px;">
          <button class="btn-ghost btn-sm" data-action="show-add-trivia" data-palace-id="${p.id}" data-room-id="${room.id}">+ Tilføj Spørgsmål</button>
        </div>`;
        html += `<div id="add-trivia-area-${room.id}"></div>`;
      } else {
        roomLocs.forEach(loc => {
          const idx = p.locations.indexOf(loc);
          html += renderLocationHTML(p.id, loc, idx, p.locations.length, rooms);
        });
        html += `<div style="padding:6px 0 2px;">
          <button class="btn-ghost btn-sm" data-action="show-add-location" data-room-id="${room.id}">+ Tilføj Sted</button>
        </div>`;
      }

      // Free notes inside room
      const roomNotes = room.notes || [];
      html += `<div class="room-notes-divider">Frie Erindringer</div>`;
      html += `<div id="add-note-area-${room.id}"></div>`;
      roomNotes.forEach(note => {
        if (app.editingNoteId === note.id) {
          html += `
          <div class="memory-item">
            <input type="text" id="edit-note-${note.id}" value="${esc(note.text)}" style="flex:1;"
              onkeydown="handleNoteEditKeydown(event,'${p.id}','${room.id}','${note.id}')">
            <button class="btn-primary btn-sm" data-action="save-note-edit" data-palace-id="${p.id}" data-room-id="${room.id}" data-note-id="${note.id}">Gem</button>
            <button class="btn-ghost btn-sm" data-action="cancel-note-edit">Annuller</button>
          </div>`;
        } else {
          html += `
          <div class="memory-item">
            <span class="memory-text">${esc(note.text)}</span>
            <button class="btn-icon" data-action="edit-note" data-palace-id="${p.id}" data-room-id="${room.id}" data-note-id="${note.id}" title="Rediger">&#9998;</button>
            <button class="btn-icon" data-action="delete-note" data-palace-id="${p.id}" data-room-id="${room.id}" data-note-id="${note.id}" title="Slet" style="color:var(--danger)">&#10005;</button>
          </div>`;
        }
      });
      if (roomNotes.length === 0) {
        html += `<p style="color:var(--muted);font-size:13px;padding:4px 0;">Ingen frie erindringer endnu.</p>`;
      }
      html += `<div style="padding:4px 0 6px;">
        <button class="btn-ghost btn-sm" data-action="show-add-note" data-palace-id="${p.id}" data-room-id="${room.id}">+ Tilføj Erindring</button>
      </div>
      </div></div>`;
    });

    if (p.type !== 'trivia') {
      const unassigned = p.locations.filter(l => !l.roomId || !rooms.find(r => r.id === l.roomId));
      html += `
        <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:14px;margin-top:${rooms.length > 0 ? '18px' : '0'};">
          <h2 style="font-size:16px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;">Steder uden rum (${unassigned.length})</h2>
          <button class="btn-ghost btn-sm" data-action="show-add-location">+ Tilføj Sted</button>
        </div>
        <div id="add-location-area"></div>
        <div class="locations-list">`;
      if (unassigned.length === 0) {
        html += `<div class="empty-state" style="padding:20px 0;"><p style="color:var(--muted)">Ingen steder uden rum.</p></div>`;
      } else {
        unassigned.forEach(loc => {
          const idx = p.locations.indexOf(loc);
          html += renderLocationHTML(p.id, loc, idx, p.locations.length, rooms);
        });
      }
      html += `</div>`;
    }
    el.innerHTML = html;
    showView('view-palace-detail');
  }

  function renderTriviaCardHTML(palaceId, loc) {
    const answer   = loc.memories.find(m => !m.text.startsWith('🧠'));
    const mnemonic = loc.memories.find(m =>  m.text.startsWith('🧠'));
    if (app.editingLocId === loc.id) {
      return `
      <div class="trivia-card" id="loc-${loc.id}">
        <div style="display:flex;flex-direction:column;gap:6px;">
          <input type="text" id="tri-q-${loc.id}" value="${esc(loc.name)}" placeholder="Spørgsmål..." style="font-weight:600;">
          <input type="text" id="tri-a-${loc.id}" value="${esc(answer ? answer.text : '')}" placeholder="Svar...">
          <input type="text" id="tri-m-${loc.id}" value="${esc(mnemonic ? mnemonic.text.replace(/^🧠\s*/,'') : '')}" placeholder="🧠 Mnemonisk note (valgfrit)..." style="font-size:13px;color:var(--muted);">
          <div style="display:flex;gap:6px;">
            <button class="btn-primary btn-sm" data-action="save-trivia-edit" data-palace-id="${palaceId}" data-loc-id="${loc.id}">Gem</button>
            <button class="btn-ghost btn-sm" data-action="cancel-loc-edit">Annuller</button>
          </div>
        </div>
      </div>`;
    }
    return `
    <div class="trivia-card" id="loc-${loc.id}">
      <div class="trivia-q">
        <span>${esc(loc.name)}</span>
        <div style="display:flex;gap:4px;flex-shrink:0;">
          <button class="btn-icon" data-action="edit-loc" data-palace-id="${palaceId}" data-loc-id="${loc.id}" title="Rediger">&#9998;</button>
          <button class="btn-icon" data-action="delete-loc" data-palace-id="${palaceId}" data-loc-id="${loc.id}" title="Slet" style="color:var(--danger)">&#128465;</button>
        </div>
      </div>
      ${answer   ? `<div class="trivia-a">${esc(answer.text)}</div>` : ''}
      ${mnemonic ? `<div class="trivia-m">${esc(mnemonic.text)}</div>` : ''}
    </div>`;
  }

  function renderLocationHTML(palaceId, loc, idx, total, rooms) {
    const isEditingLoc = app.editingLocId === loc.id;
    rooms = rooms || [];
    const roomOptions = `<option value="">— Intet rum —</option>` +
      rooms.map(r => `<option value="${r.id}"${loc.roomId === r.id ? ' selected' : ''}>${esc(r.name)}</option>`).join('');
    let html = `
      <div class="location-item" id="loc-${loc.id}">
        <div class="location-header">
          <div class="location-number">${idx + 1}</div>`;

    if (isEditingLoc) {
      html += `
          <div class="inline-edit-form" style="flex:1">
            <input type="text" id="edit-loc-name-${loc.id}" value="${esc(loc.name)}">
            <button class="btn-primary btn-sm" data-action="save-loc-edit" data-palace-id="${palaceId}" data-loc-id="${loc.id}">Gem</button>
            <button class="btn-ghost btn-sm" data-action="cancel-loc-edit">Annuller</button>
          </div>`;
    } else {
      html += `
          <span class="location-name">${esc(loc.name)}</span>
          <div class="location-actions">
            ${rooms.length > 0 ? `<select class="room-select" data-action="assign-loc-room" data-palace-id="${palaceId}" data-loc-id="${loc.id}" title="Rum">${roomOptions}</select>` : ''}
            ${idx > 0 ? `<button class="btn-icon" title="Flyt op" data-action="move-loc-up" data-palace-id="${palaceId}" data-loc-id="${loc.id}">&#9650;</button>` : ''}
            ${idx < total - 1 ? `<button class="btn-icon" title="Flyt ned" data-action="move-loc-down" data-palace-id="${palaceId}" data-loc-id="${loc.id}">&#9660;</button>` : ''}
            <button class="btn-icon" title="Rediger" data-action="edit-loc" data-palace-id="${palaceId}" data-loc-id="${loc.id}">&#9998;</button>
            <button class="btn-icon" title="Slet" data-action="delete-loc" data-palace-id="${palaceId}" data-loc-id="${loc.id}" style="color:var(--danger)">&#128465;</button>
          </div>`;
    }

    html += `</div><div class="location-memories">`;

    loc.memories.forEach(mem => {
      if (app.editingMemId === mem.id) {
        html += `
        <div class="memory-item">
          <input type="text" id="edit-mem-${mem.id}" value="${esc(mem.text)}" style="flex:1;"
            onkeydown="handleMemEditKeydown(event,'${palaceId}','${loc.id}','${mem.id}')">
          <button class="btn-primary btn-sm" data-action="save-mem-edit" data-palace-id="${palaceId}" data-loc-id="${loc.id}" data-mem-id="${mem.id}">Gem</button>
          <button class="btn-ghost btn-sm" data-action="cancel-mem-edit">Annuller</button>
        </div>`;
      } else {
        html += `
        <div class="memory-item">
          <span class="memory-text">${escLines(mem.text)}</span>
          <button class="btn-icon" data-action="edit-memory" data-palace-id="${palaceId}" data-loc-id="${loc.id}" data-mem-id="${mem.id}" title="Rediger erindring">&#9998;</button>
          <button class="btn-icon" data-action="delete-memory" data-palace-id="${palaceId}" data-loc-id="${loc.id}" data-mem-id="${mem.id}" title="Slet erindring" style="color:var(--danger)">&#10005;</button>
        </div>`;
      }
    });

    html += `
        <div class="add-memory-form">
          <div style="display:flex;gap:6px;flex:1;flex-direction:column;">
            <input type="text" id="mem-input-${loc.id}" placeholder="Erindring..." onkeydown="handleMemKeydown(event,'${palaceId}','${loc.id}')">
            <input type="text" id="mem-mnemonic-${loc.id}" placeholder="🧠 Mnemonisk note (valgfrit)..." style="font-size:13px;color:var(--muted);" onkeydown="handleMnemonicKeydown(event,'${palaceId}','${loc.id}')" onblur="setTimeout(()=>autoSaveMnemonic('${palaceId}','${loc.id}'),150)">
          </div>
          <button class="btn-ghost btn-sm" data-action="add-memory" data-palace-id="${palaceId}" data-loc-id="${loc.id}" style="align-self:flex-start;margin-top:2px;">Tilføj</button>
        </div>
      </div></div>`;

    return html;
  }

  // GENNEMGANG
  function renderReviewSession() {
    const el = document.getElementById('view-review-session');
    const p = getPalace(app.reviewPalaceId);
    if (!p) { renderView('dashboard'); return; }

    const locs = getReviewLocs(p);
    if (locs.length === 0 || app.reviewLocIdx >= locs.length) {
      renderView('dashboard');
      return;
    }

    const loc = locs[app.reviewLocIdx];
    const progress = ((app.reviewLocIdx + 1) / locs.length) * 100;
    let rangeLabel = '';
    if (app.reviewRoomId) {
      rangeLabel = ` · ${esc(getRoomName(p, app.reviewRoomId))}`;
    } else if (app.reviewLocEnd !== null) {
      rangeLabel = ` · ${locs[0].name}–${locs[locs.length - 1].name}`;
    }

    let html = `
      <button class="back-btn" data-action="back-from-review">&#8592; ${esc(p.name)}</button>
      <div class="review-progress">
        <div class="review-progress-bar" style="width:${progress}%"></div>
      </div>
      <div style="text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px;">
        Sted ${app.reviewLocIdx + 1} af ${locs.length} &nbsp;&bull;&nbsp; ${esc(p.name)}${rangeLabel}
      </div>

      <div class="review-card">
        <div class="review-card-inner${app.reviewRevealed ? ' flipped' : ''}" id="review-card-inner">
          <div class="review-card-face">
            <div class="review-loc-number">${p.type === 'trivia' ? `Spørgsmål ${app.reviewLocIdx + 1}` : `Stop #${app.reviewLocIdx + 1}`}</div>
            <div class="review-loc-name">${esc(loc.name)}</div>
            <div class="review-tap-hint">${p.type === 'trivia' ? 'Hvad er svaret?' : 'Hvilke erindringer er placeret her?'}</div>
          </div>
          <div class="review-card-face review-card-back">`;
    {
      const regularMems  = loc.memories.filter(m => !m.text.startsWith('🧠'));
      const mnemonicMems = loc.memories.filter(m =>  m.text.startsWith('🧠'));
      const totalLines   = loc.memories.reduce((s, m) => s + m.text.split('\n').length, 0);
      const sizeClass    = totalLines <= 3 ? 'size-lg' : totalLines <= 6 ? 'size-md' : totalLines <= 12 ? 'size-sm' : 'size-xs';
      function renderItems(mems) {
        return mems.map(m => {
          const parts = m.text.split('\n').filter(l => l.trim());
          if (parts.length > 1) return parts.map(l => `<div class="review-memory-item"><div class="review-memory-dot"></div><div>${esc(l.trim())}</div></div>`).join('');
          return `<div class="review-memory-item"><div class="review-memory-dot"></div><div>${escLines(m.text)}</div></div>`;
        }).join('');
      }
      const mainMems = regularMems.length ? regularMems : mnemonicMems;
      html += `<div style="display:flex;flex-direction:column;height:100%;width:100%;">`;
      html += `<div><div class="review-back-label">${p.type === 'trivia' ? 'Svar' : `Erindringer ved ${esc(loc.name)}`}</div>`;
      html += `<div class="review-memories-list ${sizeClass}">${loc.memories.length === 0 ? '<p style="color:var(--muted);font-style:italic">Ingen erindringer gemt her endnu.</p>' : renderItems(mainMems)}</div></div>`;
      if (mnemonicMems.length && regularMems.length) {
        html += `<div style="margin-top:auto;padding-top:14px;border-top:1px solid rgba(221,228,239,0.8);"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;opacity:0.7;">Mnemonisk note</div><div class="review-memories-list size-sm">${renderItems(mnemonicMems)}</div></div>`;
      }
      html += `</div>`;
    }
    html += `
          </div>
        </div>
      </div>

      <div class="review-nav">`;

    const hasNextLoc = locs.slice(app.reviewLocIdx + 1).some(l => l.memories.length > 0);
    if (!app.reviewRevealed) {
      html += `<button class="btn-teal" data-action="reveal-review">Afslør Erindringer</button>`;
    } else {
      if (hasNextLoc) {
        html += `<button class="btn-primary" data-action="next-review-loc">Næste Sted &#8594;</button>`;
      } else {
        html += `<button class="btn-primary" data-action="finish-review">Afslut Gennemgang &#10003;</button>`;
      }
    }

    html += `
        <button class="btn-ghost" data-action="skip-review">Spring over</button>
      </div>

      <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:16px;">
        <button data-action="toggle-review-peg" style="background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0;">
          <span style="font-size:11px;transition:transform 0.2s;display:inline-block;transform:rotate(${app.reviewPegOpen ? '90' : '0'}deg)">▶</span>
          Peg-liste
        </button>
        ${app.reviewPegOpen ? `
        <div style="margin-top:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px 8px;">
          ${(data.settings.pegList || []).map(([num, word]) =>
            `<div style="font-size:13px;display:flex;gap:6px;align-items:baseline;">
              <span style="font-weight:600;color:var(--accent);font-size:11px;min-width:20px;">${num}</span>
              <span style="color:var(--text);">${esc(word)}</span>
            </div>`
          ).join('')}
        </div>` : ''}
      </div>`;

    el.innerHTML = html;
    showView('view-review-session');
  }

  function completeReview() {
    const p = getPalace(app.reviewPalaceId);
    if (!p) return;
    const interval = data.settings.reviewIntervalDays || 30;
    p.srs = {
      ...p.srs,
      interval,
      repetition: (p.srs.repetition || 0) + 1,
      nextReviewDate: Date.now() + interval * 86400000,
      lastReviewDate: Date.now(),
      history: [...(p.srs.history || []), { date: Date.now(), intervalAfter: interval }]
    };
    saveData();
  }

  // ── HÆNDELSESHÅNDTERING ────────────────────────────────────────────
  document.addEventListener('change', function (e) {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    if (el.dataset.action === 'assign-loc-room') {
      if (!app.authenticated) { showLoginModal(null); return; }
      assignLocRoom(el.dataset.palaceId, el.dataset.locId, el.value || null);
      renderPalaceDetail();
    }
  });

  document.addEventListener('click', function (e) {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.dataset.action;
    const palaceId = el.dataset.palaceId;
    const locId = el.dataset.locId;
    const memId = el.dataset.memId;

    const EDIT_ACTIONS = new Set([
      'new-palace','edit-palace','delete-palace','save-palace',
      'show-add-location','add-location','save-loc-edit','delete-loc','edit-loc','move-loc-up','move-loc-down',
      'show-add-room','save-room-edit','edit-room','delete-room',
      'add-memory','edit-memory','save-mem-edit','delete-memory',
      'show-add-note','save-note-edit','edit-note','delete-note',
      'show-add-trivia','save-trivia-edit'
    ]);
    if (EDIT_ACTIONS.has(action) && !app.authenticated) {
      showLoginModal(() => el.click());
      return;
    }

    switch (action) {
      case 'new-palace':
        app.editingPalaceId = null;
        renderView('palace-editor');
        break;

      case 'edit-palace':
        app.editingPalaceId = palaceId;
        renderView('palace-editor');
        break;

      case 'view-palace':

  // ── TASTATURNAVIGATION I REVIEW ────────────────────────────────────
  document.addEventListener('keydown', function(e) {
    if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
    if (app.view === 'review-session') {
      if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowRight') {
        e.preventDefault();
        if (!app.reviewRevealed) {
          app.reviewRevealed = true;
          renderReviewSession();
        } else {
          const btn = document.querySelector('[data-action="next-review-loc"]') ||
                      document.querySelector('[data-action="finish-review"]');
          if (btn) btn.click();
        }
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        const p2 = getPalace(app.reviewPalaceId);
        const locs2 = p2 ? getReviewLocs(p2) : [];
        let prev = app.reviewLocIdx - 1;
        while (prev >= 0 && locs2[prev].memories.length === 0) prev--;
        if (prev >= 0) {
          app.reviewLocIdx = prev;
          app.reviewRevealed = false;
          renderReviewSession();
        }
      }
    }
  });

  // ── TASTATURGENVEJE ────────────────────────────────────────────────
  window.handleMemKeydown = function (e, palaceId, locId) {
    if (e.key !== 'Enter') return;
    const textInp     = document.getElementById(`mem-input-${locId}`);
    const mnemonicInp = document.getElementById(`mem-mnemonic-${locId}`);
    const text     = textInp     ? textInp.value.trim()     : '';
    const mnemonic = mnemonicInp ? mnemonicInp.value.trim() : '';
    if (!text && !mnemonic) return;
    if (text) {
      addMemory(palaceId, locId, text, mnemonic);
    } else {
      const loc = getLoc(palaceId, locId);
      if (loc) { loc.memories.push({ id: genId(), text: '🧠 ' + mnemonic, createdAt: Date.now() }); saveData(); }
    }
    renderPalaceDetail();
  };

  window.handleMnemonicKeydown = function(e, palaceId, locId) {
    if (e.key === 'Enter') { handleMemKeydown(e, palaceId, locId); return; }
    if (e.key !== 'Tab') return;
    e.preventDefault();
    const mnemonicInp = document.getElementById(`mem-mnemonic-${locId}`);
    const mnemonic = mnemonicInp ? mnemonicInp.value.trim() : '';
    if (mnemonic) {
      const textInp = document.getElementById(`mem-input-${locId}`);
      const text = textInp ? textInp.value.trim() : '';
      if (text) {
        addMemory(palaceId, locId, text, mnemonic);
      } else {
        const loc = getLoc(palaceId, locId);
        if (loc) { loc.memories.push({ id: genId(), text: '🧠 ' + mnemonic, createdAt: Date.now() }); saveData(); }
      }
      if (mnemonicInp) mnemonicInp.value = ''; // Tøm så blur-autosave ikke dobbelt-gemmer
    }
    const all = Array.from(document.querySelectorAll('[id^="mem-mnemonic-"]'));
    const idx = all.findIndex(el => el.id === `mem-mnemonic-${locId}`);
    const next = all[e.shiftKey ? idx - 1 : idx + 1];
    if (next) next.focus();
  };

  window.autoSaveMnemonic = function(palaceId, locId) {
    const mnemonicInp = document.getElementById(`mem-mnemonic-${locId}`);
    if (!mnemonicInp) return;
    const mnemonic = mnemonicInp.value.trim();
    if (!mnemonic) return;
    const textInp = document.getElementById(`mem-input-${locId}`);
    const text = textInp ? textInp.value.trim() : '';
    if (text) return; // Har brugeren udfyldt tekstfeltet, gemmes begge ved submit i stedet
    const loc = getLoc(palaceId, locId);
    if (!loc) return;
    loc.memories.push({ id: genId(), text: '🧠 ' + mnemonic, createdAt: Date.now() });
    saveData();
    renderPalaceDetail();
  };

  window.handleMapUpload = function(e, palaceId, roomId) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      setRoomMap(palaceId, roomId, ev.target.result);
      renderPalaceDetail();
    };
    reader.readAsDataURL(file);
  };

  window.handleMapClick = function(e, palaceId, roomId) {
    if (app.pinningRoomId !== roomId) return;
    const p = getPalace(palaceId);
    const roomLocs = p.locations.filter(l => l.roomId === roomId);
    const nextLoc = roomLocs.find(l => !l.pin);
    if (!nextLoc) return;
    const container = e.currentTarget;
    const rect = container.getBoundingClientRect();
    const x = parseFloat((((e.clientX - rect.left) / rect.width) * 100).toFixed(2));

    setLocationPin(palaceId, nextLoc.id, x, y);

  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escLines(str) {
    return esc(str).replace(/\n/g, '<br>');
  }

  const _PW_HASH = '808927a4db0b89e1ca292ccfe2a9dcc77ebbc6a96be7c7115a0980f7c3e9e776';
  async function _sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  window.submitLogin = async function() {
    const code = document.getElementById('login-code-input').value;
    const hash = await _sha256(code);
    if (hash === _PW_HASH) {
      app.authenticated = true;
      updateAuthButton();
      closeLoginModal();
      if (_loginCallback) { const cb = _loginCallback; _loginCallback = null; cb(); }
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('login-code-input').select();
    }
  };

  // ── EXCEL IMPORT/EXPORT ─────────────────────────────────────────────
  function exportToExcel() {
    if (data.palaces.length === 0) { alert('Ingen paladser at gemme.'); return; }
    const wb = XLSX.utils.book_new();

    // Meta-ark: beskrivelse og type per palads
    const metaRows = [['palads', 'beskrivelse', 'type']];
    for (const palace of data.palaces) {
      metaRows.push([palace.name, palace.description || '', palace.type || 'standard']);
    }
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(metaRows), 'Meta');

    for (const palace of data.palaces) {
      const rows = [['lokation', 'rækkefølge', 'værelse', 'minde']];
      const sortedLocs = [...palace.locations].sort((a, b) => a.order - b.order);
      for (const loc of sortedLocs) {
        const room = loc.roomId ? (palace.rooms || []).find(r => r.id === loc.roomId) : null;
        if (loc.memories.length === 0) {
          rows.push([loc.name, loc.order, room ? room.name : '', '']);
        } else {
          for (const mem of loc.memories) {
            rows.push([loc.name, loc.order, room ? room.name : '', mem.text]);
          }
        }
      }
      // Excel arknavn max 31 tegn, ingen special-tegn
      const sheetName = palace.name.replace(/[\\/:*?[\]]/g, '_').slice(0, 31);
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), sheetName);
    }
    XLSX.writeFile(wb, 'hukommelsespalads.xlsx');
  }

  function importFromExcel(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const now = Date.now();
        const existingByName = new Map(data.palaces.map(p => [p.name, p]));

        // Læs Meta-ark for beskrivelse og type
        const metaByName = {};
        if (wb.SheetNames.includes('Meta')) {
          for (const row of XLSX.utils.sheet_to_json(wb.Sheets['Meta'], { defval: '' })) {
            const navn = (row['palads'] || '').trim();
            if (navn) metaByName[navn] = { description: (row['beskrivelse'] || '').trim(), type: (row['type'] || '').trim() };
          }
        }

        for (const sheetName of wb.SheetNames.filter(n => n !== 'Meta')) {
          const paladsNavn = sheetName.trim();
          const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: '' });
          const existing = existingByName.get(paladsNavn);

          // Grupér lokationer
          const locMap = new Map();
          for (const row of rows) {
            const lokNavn = (row['lokation'] || '').trim();
            const ordre   = parseInt(row['rækkefølge']) || 0;
            const værelse = (row['værelse'] || '').trim();
            const minde   = (row['minde'] || '').toString().trim();
            if (!lokNavn) continue;
            if (!locMap.has(lokNavn)) locMap.set(lokNavn, { order: ordre, room: værelse, memories: [] });
            if (minde) locMap.get(lokNavn).memories.push(minde);
          }

          // Byg værelsesliste
          const roomNames = new Set([...locMap.values()].map(l => l.room).filter(Boolean));
          let rooms = existing ? [...existing.rooms] : [];
          for (const rName of roomNames) {
            if (!rooms.find(r => r.name === rName)) rooms.push({ id: genId(), name: rName, notes: [] });
          }
          const roomByName = new Map(rooms.map(r => [r.name, r]));

          // Byg lokationsliste
          const locations = [];
          for (const [lokNavn, locData] of locMap) {
            const existingLoc = existing ? existing.locations.find(l => l.name === lokNavn) : null;
            const room = locData.room ? roomByName.get(locData.room) : null;
            const memories = locData.memories.map(text => ({ id: genId(), text, createdAt: now }));
            locations.push({
              id: existingLoc ? existingLoc.id : genId(),
              order: locData.order,
              name: lokNavn,
              memories,
              roomId: room ? room.id : (existingLoc ? existingLoc.roomId : null),
            });
          }
          locations.sort((a, b) => a.order - b.order);

          const meta = metaByName[paladsNavn] || {};
          const importedPalace = {
            id: existing ? existing.id : genId(),
            name: paladsNavn,
            description: meta.description || (existing ? existing.description : ''),
            type: meta.type || (existing ? existing.type : 'standard'),
            createdAt: existing ? existing.createdAt : now,
            rooms,
            locations,
            notes: existing ? existing.notes : [],
            srs: existing ? existing.srs : {
              interval: 1, repetition: 0, efactor: SM2_EF_DEFAULT,
              nextReviewDate: now, lastReviewDate: null, history: []
            },
          };
          // Bevar interne system-felter så initialiseringen ikke duplikerer paladset
          if (existing && existing._histTag) { importedPalace._histTag = existing._histTag; importedPalace._v = existing._v; }

          const idx = data.palaces.findIndex(p => p.name === paladsNavn);
          if (idx !== -1) data.palaces[idx] = importedPalace;
          else data.palaces.push(importedPalace);
        }

        saveData();
        renderView('dashboard');
        alert('✓ Importeret ' + wb.SheetNames.length + ' palads(er).');
      } catch (err) {
        console.error(err);
        alert('Fejl ved indlæsning: ' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  }
