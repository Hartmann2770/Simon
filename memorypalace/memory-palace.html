<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Hukommelsespalads</title>
  <link rel="icon" href="favicon-palace.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdf8f3;
      --surface: #ffffff;
      --surface-raised: #f4f2fd;
      --accent: #7557da;        /* Palads dyb violet */
      --accent-light: #9575e0;
      --teal: #d178de;          /* Palads pink/magenta */
      --danger: #991b1b;
      --gold: #f8b116;          /* Palads amber */
      --text: #1c1412;
      --muted: #78716c;
      --border: #e4dff5;
      --shadow: 0 2px 12px rgba(117,87,218,0.08);
      --shadow-lg: 0 6px 28px rgba(117,87,218,0.14);
      --radius: 14px;
      --radius-sm: 9px;
    }

    html { height: 100%; }
    body {
      min-height: 100%;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 15% 0%, rgba(117,87,218,0.07) 0%, transparent 55%),
                        radial-gradient(ellipse at 85% 100%, rgba(209,120,222,0.06) 0%, transparent 55%);
      background-attachment: fixed;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    /* APP BAR */
    @keyframes gradientFlow {
      from { background-position: 0% 0%; }
      to   { background-position: 100% 0%; }
    }
    #app-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: calc(30px + env(safe-area-inset-top));
      padding-top: env(safe-area-inset-top);
      background: linear-gradient(90deg,
        #feea2a  0%,
        #f8b116  8.33%,
        #f8e595 16.67%,
        #858ce1 25%,
        #7557da 33.33%,
        #d178de 41.67%,
        #feea2a 50%,
        #f8b116 58.33%,
        #f8e595 66.67%,
        #858ce1 75%,
        #7557da 83.33%,
        #d178de 91.67%,
        #feea2a 100%
      );
      background-size: 200% 100%;
      animation: gradientFlow 20s linear infinite;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: 14px;
      padding-right: 14px;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(117,87,218,0.18);
    }
    @media (prefers-reduced-motion: reduce) {
      #app-bar { animation: none; }
    }
    .app-title {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.22);
      letter-spacing: 0.04em;
      cursor: pointer;
    }
    #app-bar .bar-icon-btn {
      background: none;
      border: none;
      padding: 0 4px;
      cursor: pointer;
      font-size: 17px;
      line-height: 1;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
      transition: transform 0.15s, opacity 0.15s;
      opacity: 0.88;
    }
    #app-bar .bar-icon-btn:hover { opacity: 1; transform: scale(1.12); }

    /* MAIN */
    #app-root {
      max-width: 720px;
      margin: 0 auto;
      padding: calc(42px + env(safe-area-inset-top)) 16px 40px;
    }

    .view { display: none; }
    .view.active { display: block; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .view.active { animation: fadeSlideIn 0.2s ease-out; }

    /* TYPOGRAPHY */
    h1 { font-family: 'Cinzel', serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    h2 { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    h3 { font-family: 'Cinzel', serif; font-size: 17px; font-weight: 600; }
    .muted { color: var(--muted); font-size: 13px; }

    /* BUTTONS */
    button {
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 18px;
      transition: transform 0.1s, opacity 0.1s, background 0.15s;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-primary { background: linear-gradient(135deg, var(--accent), #4a2db0); color: #fff; box-shadow: 0 2px 12px rgba(117,87,218,0.32); }
    .btn-primary:hover { background: linear-gradient(135deg, var(--accent-light), var(--accent)); box-shadow: 0 4px 16px rgba(117,87,218,0.42); }
    .btn-teal { background: linear-gradient(135deg, var(--teal), #a040b8); color: #fff; font-weight: 600; box-shadow: 0 2px 10px rgba(209,120,222,0.30); }
    .btn-teal:hover { background: linear-gradient(135deg, #dc8ce8, var(--teal)); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(224,92,107,0.5); padding: 7px 14px; }
    .btn-danger:hover { background: rgba(224,92,107,0.1); border-color: var(--danger); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { background: var(--surface-raised); border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-icon { background: transparent; color: var(--muted); padding: 4px 8px; font-size: 16px; border-radius: 6px; }
    .btn-icon:hover { background: var(--surface-raised); color: var(--text); }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    /* FORM ELEMENTS */
    input[type="text"], textarea {
      width: 100%;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
    }
    input[type="text"]::placeholder, textarea::placeholder {
      color: var(--muted);
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .form-group { margin-bottom: 16px; }

    /* DASHBOARD */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .palaces-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .palace-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: border-color 0.25s, transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .palace-card:hover {
      border-color: rgba(117,87,218,0.5);
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg), 0 0 0 1px rgba(117,87,218,0.12);
    }
    .palace-card-badge {
      position: absolute;
      top: 10px; right: 10px;
      background: var(--gold);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }
    .palace-card-name {
      font-family: 'Cinzel', serif;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
      padding-right: 60px;
    }
    .palace-card-desc {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .palace-card-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .palace-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    /* COLLECTION CARDS */
    .collection-card {
      background: var(--surface);
      border: 1px solid rgba(117,87,218,0.18);
      border-radius: var(--radius);
      padding: 20px 22px;
      cursor: pointer;
      transition: border-color 0.25s, transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: flex-start;
      position: relative;
    }
    .collection-card:hover {
      border-color: rgba(117,87,218,0.5);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .collection-card-body { flex: 1; min-width: 0; }
    .collection-card-name {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .collection-card-desc {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .collection-palace-dots {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 8px;
    }
    .collection-palace-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 4px rgba(0,0,0,0.4);
    }
    .collection-card-meta {
      font-size: 12px;
      color: var(--muted);
    }
    .collection-card-auth-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      align-items: flex-start;
      padding-top: 2px;
    }
    .collections-section-title {
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
      margin-bottom: 10px;
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { margin-bottom: 20px; font-size: 15px; }

    /* PALACE DETAIL */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 20px;
      background: none;
      border: none;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }
    .back-btn:hover { color: var(--text); transform: none; }

    .palace-detail-header {
      margin-bottom: 24px;
    }
    .palace-detail-srs {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
    }
    .palace-detail-srs span { display: flex; align-items: center; gap: 5px; }
    .srs-due { color: var(--accent); font-weight: 600; }

    .locations-list { margin-top: 20px; }
    .location-item {
      background: linear-gradient(160deg, var(--surface) 0%, var(--surface-raised) 100%);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s;
    }
    .location-item:has(.loc-sat-strip) { padding-right: 130px; }
    .location-item:hover { border-color: rgba(117,87,218,0.4); }
    .location-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      gap: 12px;
    }
    .location-number {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .location-name {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      flex: 1;
    }
    .location-name[data-action] { cursor: pointer; }
    .location-name[data-action]:hover { color: var(--accent); }
    .location-actions { display: flex; gap: 4px; }
    .location-memories {
      padding: 0 16px 14px 52px;
    }
    .memory-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .memory-item:last-child { border-bottom: none; }
    .memory-text { flex: 1; }
    .memory-item .btn-icon { font-size: 13px; padding: 3px 6px; flex-shrink: 0; }

    .add-memory-form {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .add-memory-form input, .add-memory-form textarea { width: 100%; }
    .add-memory-form textarea, .memory-item textarea {
      resize: none;
      font-family: inherit;
      font-size: inherit;
      line-height: 1.4;
      overflow: hidden;
      min-height: 34px;
    }

    .add-location-form {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .add-location-form .form-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .add-location-form input { flex: 1; }

    /* RUMKORT */
    .room-map-wrap { padding: 0 10px 10px; }
    .room-map-container {
      position: relative;
      display: inline-block;
      width: 100%;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
      user-select: none;
    }
    .room-map-container.pinning { cursor: crosshair; }
    .room-map-img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
    }
    .map-pin {
      position: absolute;
      transform: translate(-50%, -100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }
    .room-map-container.pinning .map-pin { pointer-events: all; }
    .map-pin-num {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      width: 22px;
      height: 22px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .map-pin-num span { transform: rotate(45deg); display:block; }
    .map-pin-del {
      position: absolute;
      top: -6px;
      right: -8px;
      background: var(--danger);
      border: none;
      color: #fff;
      font-size: 9px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
    }
    .room-map-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 2px 2px;
      font-size: 13px;
    }
    .map-hint { flex: 1; color: var(--muted); }
    .map-hint strong { color: var(--text); }

    /* TRIVIA CARDS */
    .trivia-card {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-bottom: 8px;
    }
    .trivia-q {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .trivia-a {
      font-size: 14px;
      color: var(--teal);
      padding-left: 10px;
      border-left: 2px solid var(--teal);
      margin-bottom: 4px;
    }
    .trivia-m {
      font-size: 12px;
      color: var(--muted);
      padding-left: 10px;
    }

    /* FRIE ERINDRINGER */
    .room-notes-divider {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 8px 0 4px;
      border-top: 1px solid var(--border);
      margin-top: 6px;
    }

    /* ROOMS */
    .room-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .room-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface-raised);
      border-bottom: 1px solid var(--border);
    }
    .room-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--accent-light);
    }
    .room-locations {
      padding: 8px 10px;
    }
    .room-locations .location-item {
      margin-bottom: 8px;
    }
    .room-select {
      font-size: 12px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      padding: 2px 4px;
      cursor: pointer;
      max-width: 110px;
    }
    .room-select:focus { outline: none; border-color: var(--accent); }

    /* REVIEW SESSION */
    .review-progress {
      height: 4px;
      background: var(--surface-raised);
      border-radius: 2px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .review-progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .review-card {
      perspective: 1000px;
      margin-bottom: 24px;
      height: calc(100vh - 280px);
      min-height: 300px;
      max-height: 600px;
    }
    @media (min-width: 481px) {
      .review-card { max-height: 420px; max-width: 440px; margin-left: auto; margin-right: auto; }
    }
    .review-card-inner {
      position: relative;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.5s ease;
    }
    .review-card-inner.flipped { transform: rotateY(180deg); }

    .review-card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 36px 40px;
      padding-top: 52px;
      text-align: center;
      box-shadow: var(--shadow-lg);
      overflow-y: auto;
    }
    .review-card-back {
      transform: rotateY(180deg);
      align-items: flex-start;
      justify-content: flex-start;
      text-align: left;
      padding: 32px 36px 48px;
      background: var(--surface-raised);
    }
    .review-card-face.has-sat-img {
      padding: 0;
      justify-content: flex-start;
      align-items: flex-start;
      overflow: hidden;
    }
    .review-sat-wrap {
      width: 100%;
      height: 55%;
      overflow: hidden;
      border-radius: var(--radius) var(--radius) 0 0;
      position: relative;
      flex-shrink: 0;
      background: #ccc;
    }
    .review-sat-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .review-sat-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: #888;
    }
    .review-sat-crosshair {
      position: absolute; top: 50%; left: 50%;
      transform: translate(0%, -100%);
      font-size: 28px; line-height: 1;
      pointer-events: none;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));
    }
    .review-sat-badge {
      position: absolute; bottom: 6px; right: 8px;
      background: rgba(0,0,0,0.5); color: white;
      font-size: 9px; padding: 2px 6px; border-radius: 8px; letter-spacing: 0.03em;
    }
    .loc-sat-strip {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 130px; overflow: hidden;
      cursor: pointer; border-left: 1px solid var(--border);
      background: #c8d4c8;
    }
    .loc-sat-strip img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      opacity: 0; transition: opacity 0.3s;
    }
    .loc-sat-strip-pin {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -100%);
      font-size: 22px; pointer-events: none;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
    }
    .loc-sat-strip-hint {
      position: absolute; bottom: 5px; right: 7px;
      font-size: 10px; color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.45); padding: 1px 6px;
      border-radius: 4px; pointer-events: none; letter-spacing: 0.02em;
    }
    .dk-flag {
      display: inline-block; width: 20px; height: 14px;
      background: #C60C30; border-radius: 1px;
      position: relative; vertical-align: middle;
      margin-right: 5px; flex-shrink: 0; overflow: hidden;
    }
    .dk-flag::before {
      content: ''; position: absolute;
      left: 6px; top: 0; width: 3px; height: 100%; background: white;
    }
    .dk-flag::after {
      content: ''; position: absolute;
      top: 0; left: 0; width: 100%; height: 3px;
      background: white; top: 50%; transform: translateY(-50%);
    }
    .review-sat-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      text-align: center; padding: 18px 24px; width: 100%;
    }

    .review-loc-number {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }
    .review-loc-name {
      font-family: 'Cinzel', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
    }
    .review-tap-hint {
      color: var(--muted);
      font-size: 13px;
    }

    .review-memories-list {
      width: 100%;
    }
    .review-memories-list.size-lg  { font-size: 16px; }
    .review-memories-list.size-md  { font-size: 15px; }
    .review-memories-list.size-sm  { font-size: 14px; }
    .review-memories-list.size-xs  { font-size: 12px; }
    .review-memory-item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(220,215,248,0.8);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      line-height: 1.5;
    }
    .review-memory-item:last-child { border-bottom: none; }
    .review-memory-dot {
      width: 7px; height: 7px;
      background: var(--teal);
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.45em;
    }
    .review-back-label {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.7;
    }

    .review-nav {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    /* PALACE EDITOR */
    .editor-header { margin-bottom: 28px; }

    /* REVIEW SUMMARY */
    .review-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
      margin-bottom: 20px;
    }
    .review-summary h2 { margin-bottom: 8px; }
    .review-summary .next-date {
      font-size: 18px;
      color: var(--teal);
      font-weight: 600;
      margin: 16px 0 8px;
    }

    /* INLINE EDIT */
    .inline-edit-form {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      padding: 10px 0 4px;
    }
    .inline-edit-form input { flex: 1; }

    /* UTILS */
    .flex { display: flex; }
    .gap-8 { gap: 8px; }
    .gap-12 { gap: 12px; }
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }
    .mb-8 { margin-bottom: 8px; }
    .text-center { text-align: center; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* MOBILE / TOUCH */
    button, [data-action] {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* iOS: forhindrer auto-zoom på inputs (kræver font-size >= 16px) */
    @media (max-width: 480px) {
      input, textarea, select { font-size: 16px !important; }
    }

    @media (max-width: 480px) {
      /* App bar: behold safe-area top-padding, tilføj sidepadding */
      #app-bar { padding-left: 10px; padding-right: 10px; gap: 6px; }
      .app-title { font-size: 15px; letter-spacing: 0; }
      .btn-label { display: none; }

      /* Indhold: top-padding matcher app-bar højde inkl. safe-area */
      #app-root { padding-left: 10px; padding-right: 10px; }

      /* Typografi */
      h1 { font-size: 22px; }
      h2 { font-size: 18px; }

      /* Dashboard-grid: altid én kolonne */
      .palaces-grid { grid-template-columns: 1fr; }
      .palace-card { padding: 16px; }
      .palace-card-actions { flex-wrap: wrap; gap: 6px; }
      .collection-card { padding: 14px; }

      /* Touch targets: større ikonknapper */
      .btn-icon { padding: 8px 10px; font-size: 16px; }
      .btn-sm { padding: 7px 12px; font-size: 13px; }

      /* Review-kort: kompakt højde */
      .review-card { height: min(42vh, 340px); min-height: 220px; margin-bottom: 16px; }
      .review-card-face { padding: 20px 16px; }
      .review-card-back { padding: 16px; }
      .review-loc-name { font-size: 22px; margin-bottom: 10px; }

      /* Peg-liste: håndteres i separat media query efter desktop-reglerne */

      /* Location-header: undgå overflow */
      .location-header { padding: 12px 10px; gap: 8px; }
      .location-actions { gap: 2px; }

      /* Rum-knapper: lidt mere luft */
      .room-header { padding: 10px 10px; }
    }

    /* Safe-area padding til bund (iPhone home bar) */
    #app-root { padding-bottom: max(40px, env(safe-area-inset-bottom)); }

    /* Peg-overlay: mørkt lag bag bottom sheet, klik for at lukke */


    /* PEG SIDEBAR */
    #peg-sidebar {
      position: fixed;
      top: 60px;
      right: 0;
      bottom: 0;
      width: 320px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 150;
    }
    #peg-sidebar.open { transform: translateX(0); }
    #peg-sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--accent-light);
      flex-shrink: 0;
    }
    #peg-sidebar-header button {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }
    #peg-sidebar-list {
      overflow-y: auto;
      flex: 1;
      padding: 4px 6px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(25, auto);
      grid-auto-flow: column;
      align-content: start;
      gap: 1px;
    }
    .peg-row {
      display: flex;
      gap: 5px;
      align-items: baseline;
      padding: 2px 4px;
      border-radius: 4px;
    }
    .peg-row:hover { background: var(--surface-raised); }
    .peg-num {
      font-family: 'Cinzel', serif;
      color: var(--accent-light);
      font-size: 11px;
      min-width: 18px;
      flex-shrink: 0;
    }
    .peg-word { color: var(--text); font-size: 12px; line-height: 1.4; }
    .peg-edit-input {
      width: 100%;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 14px;
      padding: 5px 8px;
    }
    .peg-edit-input:focus { outline: none; border-color: var(--accent); }
    /* PEG FLASHCARD */
    .peg-flashcard {
      width: 100%; height: 240px;
      perspective: 900px;
      cursor: pointer;
      margin-bottom: 14px;
    }
    .peg-card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s ease;
    }
    .peg-card-inner.flipped { transform: rotateY(180deg); }
    .peg-card-front, .peg-card-back {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      border-radius: 12px;
      border: 2px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #fff;
      padding: 16px;
      box-sizing: border-box;
    }
    .peg-card-back { transform: rotateY(180deg); }
    #peg-toggle-btn.active {
      opacity: 1;
      filter: drop-shadow(0 0 4px rgba(255,255,255,0.7));
    }

    /* PEG SIDEBAR: mobil bottom-sheet — skal stå EFTER desktop-reglerne */
    @media (max-width: 480px) {
      #peg-sidebar {
        top: auto !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        width: 100% !important;
        height: 40vh !important;
        transform: translateY(100%) !important;
        border-left: none;
        border-top: 1px solid var(--border);
        border-radius: 16px 16px 0 0;
      }
      #peg-sidebar.open { transform: translateY(0) !important; }
      body.peg-sidebar-open #view-review-session {
        padding-bottom: 42vh;
      }
    }
  </style>
</head>

<!-- SETTINGS MODAL -->
<div id="settings-modal" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:320px;width:90%;box-shadow:var(--shadow);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <h2 style="font-size:16px;">&#9881; Indstillinger</h2>
      <button onclick="closeSettingsModal()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;">&#10005;</button>
    </div>
    <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:6px;">Genopfriskningsinterval (dage)</label>
    <div style="display:flex;gap:8px;align-items:center;">
      <input type="number" id="settings-interval-input" min="1" max="365"
        style="width:70px;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;color:var(--text);font-size:15px;">
      <span style="color:var(--muted);font-size:13px;">dage</span>
      <button class="btn-primary btn-sm" onclick="saveSettings()">Gem</button>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-top:8px;">Notifikation vises på paladskortet efter dette antal dage.</p>
    <div style="border-top:1px solid var(--border);margin-top:18px;padding-top:16px;">
      <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:10px;">Excel</label>
      <div style="display:flex;gap:8px;">
        <button class="btn-ghost btn-sm" onclick="exportToExcel()" style="flex:1">&#128229; Gem Excel</button>
        <button class="btn-ghost btn-sm" onclick="triggerExcelImport()" style="flex:1">&#128228; Indlæs Excel</button>
      </div>
    </div>
    <div style="border-top:1px solid var(--border);margin-top:18px;padding-top:16px;">
      <button class="btn-ghost btn-sm" onclick="handleLogout()" style="width:100%;color:var(--muted);">&#128274; Log ud</button>
    </div>
  </div>
</div>

<!-- LOGIN MODAL -->
<div id="login-modal" style="display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;max-width:320px;width:90%;box-shadow:var(--shadow-lg);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="font-size:17px;">&#128274; Log ind</h2>
      <button onclick="closeLoginModal()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;">&#10005;</button>
    </div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px;">Indtast koden for at redigere paladset.</p>
    <div class="form-group">
      <input type="password" id="login-code-input" placeholder="Kode" style="letter-spacing:0.2em;" onkeydown="if(event.key==='Enter')submitLogin()">
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-bottom:14px;cursor:pointer;">
      <input type="checkbox" id="login-remember-me" checked style="width:15px;height:15px;cursor:pointer;accent-color:var(--teal);">
      Husk mig i 30 dage
    </label>
    <div id="login-error" style="display:none;color:var(--danger);font-size:13px;margin-bottom:12px;">Forkert kode. Prøv igen.</div>
    <button class="btn-primary" style="width:100%" onclick="submitLogin()">Log ind</button>
  </div>
</div>

<!-- PEG DRILL MODAL -->
<div id="peg-drill-modal" style="display:none;position:fixed;inset:0;z-index:350;background:rgba(0,0,0,0.75);align-items:center;justify-content:center;" onclick="if(event.target===this)closePegDrill()">
  <div id="peg-drill-inner" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;max-width:380px;width:92%;box-shadow:var(--shadow-lg);"></div>
</div>

<!-- PEG SIDEBAR -->
<div id="peg-sidebar">
  <div id="peg-sidebar-header">
    <span>&#128220; Peg-liste</span>
    <div style="display:flex;gap:6px;">
      <button id="peg-drill-btn" onclick="openPegDrill()" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:12px;padding:2px 8px;cursor:pointer;display:none;">&#127183; Øv</button>
      <button onclick="openPegStats()" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:12px;padding:2px 8px;cursor:pointer;">&#128200;</button>
      <button id="peg-edit-btn" onclick="togglePegEdit()" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:12px;padding:2px 8px;cursor:pointer;display:none;">Rediger</button>
      <button onclick="togglePegSidebar()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;">&#10005;</button>
    </div>
  </div>
  <div id="peg-sidebar-list"></div>
</div>

  <section id="view-palace-detail" class="view"></section>

      <div style="margin-bottom:20px;">
        <input type="text" id="search-input" placeholder="&#128269; Søg i paladser og erindringer..."
          value="${esc(app.searchQuery)}" oninput="searchPalaces(this.value)"
          style="width:100%;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;padding:10px 14px;outline:none;transition:border-color 0.2s;"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
      </div>`;

    if (allPalaces.length === 0 && data.collections.length === 0) {
      html += `
        <div class="empty-state">
          <div class="empty-icon">&#127963;</div>
          <p>Ingen hukommelsespaladser endnu.<br>Opret dit første for at komme i gang.</p>
          ${app.authenticated ? `<button class="btn-primary" data-action="new-palace">Opret Palads</button>` : ''}
        </div>`;
    } else if (q && filtered.length === 0) {
      html += `<p style="color:var(--muted);text-align:center;padding:40px 0;">Ingen resultater for "${esc(q)}"</p>`;
    } else if (q) {
      // Search mode: flat list
      html += `<div class="palaces-grid">` + filtered.map(p => palaceCardHtml(p, q)).join('') + `</div>`;
    } else {
      // Normal mode: collections + ungrouped
      if (data.collections.length > 0) {
        html += `<div class="collections-section-title">Samlinger</div><div class="palaces-grid" style="margin-bottom:28px;">`;
        for (const f of data.collections) {
          const fps = allPalaces.filter(p => p.collectionId === f.id);
          const palaceChips = fps.length > 0
            ? fps.map(p => `
                <div data-action="view-palace" data-palace-id="${p.id}" style="display:inline-flex;align-items:center;gap:5px;background:var(--surface-raised);border-radius:20px;padding:3px 10px 3px 7px;font-size:12px;color:var(--text);cursor:pointer;transition:background 0.15s;" onmouseenter="this.style.background='var(--border)'" onmouseleave="this.style.background='var(--surface-raised)'">
                  <div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${srsColor(p.srs)};box-shadow:${srsIsOverdue(p.srs)?'0 0 5px 2px #dc2626,0 0 12px 3px rgba(220,38,38,0.4)':'0 0 4px '+srsColor(p.srs)};"></div>
                  ${esc(p.name)}
                </div>`).join('')
            : `<span style="color:var(--muted);font-size:12px;font-style:italic;">Ingen paladser endnu</span>`;
          html += `
            <div class="collection-card" data-action="open-collection" data-collection-id="${f.id}">
              <div class="collection-card-body">
                <div class="collection-card-name">${esc(f.name)}</div>
                <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;">${palaceChips}</div>
              </div>
              ${app.authenticated ? `
              <div class="collection-card-auth-actions" onclick="event.stopPropagation()">
                <button class="btn-ghost btn-sm" data-action="edit-collection" data-collection-id="${f.id}">&#9998;</button>
                <button class="btn-danger btn-sm" data-action="delete-collection" data-collection-id="${f.id}">&#128465;</button>
              </div>` : ''}
            </div>`;
        }
        html += `</div>`;
      }

      const ungrouped = allPalaces.filter(p => !p.collectionId);
      if (ungrouped.length > 0) {
        if (data.collections.length > 0) html += `<div class="collections-section-title">Løse Paladser</div>`;
        const due = ungrouped.filter(isDue);
        const rest = ungrouped.filter(p => !isDue(p));
        html += `<div class="palaces-grid">` + [...due, ...rest].map(p => palaceCardHtml(p, '')).join('') + `</div>`;
      }
    }

    el.innerHTML = html;
    showView('view-dashboard');
  }

  function palaceCardHtml(p, q) {
    const locCount = p.locations.length;
    const memCount = p.locations.reduce((s, l) => s + l.memories.length, 0);
    const daysSince = p.srs && p.srs.lastReviewDate
      ? Math.floor((Date.now() - p.srs.lastReviewDate) / 86400000)
      : null;
    const showBadge = daysSince === null || daysSince >= (data.settings.reviewIntervalDays || 30);
    const badgeText = daysSince === null ? 'Aldrig øvet' : `${daysSince} dag${daysSince !== 1 ? 'e' : ''} siden`;
    const reviewed = p.srs && p.srs.lastReviewDate;
    const dotColor = srsColor(p.srs);
    return `
      <div class="palace-card" data-palace-id="${p.id}">
        ${showBadge ? `<span class="palace-card-badge">${badgeText}</span>` : ''}
        <div data-action="view-palace" data-palace-id="${p.id}" style="cursor:pointer;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <div style="width:12px;height:12px;border-radius:50%;background:${dotColor};flex-shrink:0;box-shadow:${srsIsOverdue(p.srs)?'0 0 6px 2px #dc2626,0 0 18px 4px rgba(220,38,38,0.45)':'0 0 5px '+dotColor};"></div>
            <div class="palace-card-name" style="margin-bottom:0;padding-right:${showBadge?'60px':'0'}">${esc(p.name)}${p.type === 'trivia' ? ' <span style="font-size:11px;background:var(--surface-raised);border:1px solid var(--border);border-radius:4px;padding:1px 6px;vertical-align:middle;color:var(--muted)">Trivia</span>' : ''}</div>
          </div>
          <div class="palace-card-desc">${esc(p.description) || '<em style="color:var(--muted)">Ingen beskrivelse</em>'}</div>
          <div class="palace-card-meta">
            <span>&#128205; ${locCount} ${locCount !== 1 ? 'steder' : 'sted'}</span>
            <span>&#128214; ${memCount} ${memCount !== 1 ? 'erindringer' : 'erindring'}</span>
            <span>&#128197; ${reviewed ? 'Sidst: ' + formatDate(p.srs.lastReviewDate) : 'Aldrig gennemgået'}</span>
          </div>
        </div>
        <div class="palace-card-actions">
          <button class="btn-ghost btn-sm" data-action="choose-review" data-palace-id="${p.id}">&#9654; Øv</button>
          ${app.authenticated ? `
            <button class="btn-ghost btn-sm" data-action="edit-palace" data-palace-id="${p.id}">&#9998; Rediger</button>
            <button class="btn-danger btn-sm" data-action="delete-palace" data-palace-id="${p.id}">&#128465;</button>
          ` : ''}
        </div>
        ${q ? (() => {
          const hits = p.locations.filter(l =>
            l.name.toLowerCase().includes(q) ||
            l.memories.some(m => m.text.toLowerCase().includes(q))
          ).slice(0, 4);
          if (!hits.length) return '';
          return '<div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px;">' +
            hits.map(l => '<div style="font-size:12px;color:var(--muted);padding:2px 0;">' +
              '<span style="color:var(--accent-light)">&#128205; ' + escFlag(l.name) + '</span>' +
              l.memories.filter(m => m.text.toLowerCase().includes(q)).slice(0,2).map(m =>
                '<span style="display:block;padding-left:12px;color:var(--text);opacity:0.7;">' + escLines(m.text) + '</span>'
              ).join('') +
            '</div>').join('') +
          '</div>';
        })() : ''}
      </div>`;
  }

  function renderCollectionDetail() {
    const el = document.getElementById('view-collection-detail');
    const f = getCollection(app.editingCollectionId);
    if (!f) { renderView('dashboard'); return; }
    const fps = data.palaces.filter(p => p.collectionId === f.id);
    const alpha = (a, b) => a.name.localeCompare(b.name, 'da');
    const due = fps.filter(isDue).sort(alpha);
    const rest = fps.filter(p => !isDue(p)).sort(alpha);
    const sorted = [...due, ...rest];
    let html = `
      <button class="back-btn" data-action="back-from-collection">&#8592; Alle Paladser</button>
      <div class="section-header">
        <div>
          <h1>${esc(f.name)}</h1>
          ${f.description ? `<p class="muted" style="margin-top:4px;">${esc(f.description)}</p>` : ''}
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          ${fps.length > 1 ? `<button class="btn-teal" data-action="review-all-in-collection" data-collection-id="${f.id}">Gennemgå alle &#8594;</button>` : ''}
          ${app.authenticated ? `<button class="btn-primary" data-action="new-palace-in-collection" data-collection-id="${f.id}">+ Nyt Palads</button>` : ''}
        </div>
      </div>`;
    if (sorted.length === 0) {
      html += `<div class="empty-state">
        <div class="empty-icon">&#127963;</div>
        <p>Ingen paladser i denne samling endnu.</p>
        ${app.authenticated ? `<button class="btn-primary" data-action="new-palace-in-collection" data-collection-id="${f.id}">Opret Palads</button>` : ''}
      </div>`;
    } else {
      html += `<div class="palaces-grid">` + sorted.map(p => palaceCardHtml(p, '')).join('') + `</div>`;
    }
    el.innerHTML = html;
    showView('view-collection-detail');
  }

  function renderCollectionEditor() {
    const el = document.getElementById('view-collection-editor');
    const f = app.editingCollectionId ? getCollection(app.editingCollectionId) : null;
    const isEdit = !!f;
    el.innerHTML = `
      <button class="back-btn" data-action="back-from-collection-editor">&#8592; Tilbage</button>
      <div class="editor-header">
        <h1>${isEdit ? 'Rediger Samling' : 'Ny Samling'}</h1>
      </div>
      <div class="card">
        <div class="form-group">
          <label>Samlingens navn</label>
          <input type="text" id="collection-editor-name" placeholder="fx Cocktails" value="${esc(f ? f.name : '')}">
        </div>
        <div class="form-group">
          <label>Beskrivelse</label>
          <textarea id="collection-editor-desc" rows="2" placeholder="Beskriv indholdet...">${esc(f ? f.description : '')}</textarea>
        </div>
        <div class="flex gap-8 mt-16">
          <button class="btn-primary" data-action="save-collection">${isEdit ? 'Gem ændringer' : 'Opret Samling'}</button>
          <button class="btn-ghost" data-action="back-from-collection-editor">Annuller</button>
        </div>
      </div>`;

  }

  // PALADS-REDIGERING

    const palace = app.editingPalaceId ? getPalace(app.editingPalaceId) : null;
    const isEdit = !!palace;

    el.innerHTML = `
      <button class="back-btn" data-action="back-from-editor">&#8592; Tilbage</button>
      <div class="editor-header">
        <h1>${isEdit ? 'Rediger Palads' : 'Nyt Palads'}</h1>
      </div>
      <div class="card">
        <div class="form-group">
          <label>Paladsnavnet</label>
          <input type="text" id="editor-name" placeholder="fx Mit barndomshjem" value="${esc(palace ? palace.name : '')}">
        </div>
        <div class="form-group">
          <label>Beskrivelse</label>
          <textarea id="editor-desc" rows="3" placeholder="Beskriv ruten eller stedet...">${esc(palace ? palace.description : '')}</textarea>
        </div>
        <div class="form-group">
          <label>Type</label>
          <div style="display:flex;gap:16px;margin-top:6px;">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="radio" name="palace-type" id="type-standard" value="standard" ${(!palace || palace.type !== 'trivia') ? 'checked' : ''}>
              <span>Hukommelsespalads</span>
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="radio" name="palace-type" id="type-trivia" value="trivia" ${palace && palace.type === 'trivia' ? 'checked' : ''}>
              <span>&#10067; Trivia</span>
