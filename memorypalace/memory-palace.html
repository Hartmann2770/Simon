          </div>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="editor-route-palace" ${palace && palace.routePalace ? 'checked' : ''}>
            <span>&#128506; L&#248;bepalads <small style="color:var(--muted);font-weight:400;">(viser satellit-billede ved hvert sted under gennemgang)</small></span>
          </label>
        </div>
        ${data.collections.length > 0 ? `
        <div class="form-group">
          <label>Samling</label>
          <select id="editor-collection" style="width:100%;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;padding:10px 14px;outline:none;">
            <option value="">— Ingen samling —</option>
            ${data.collections.map(f => `<option value="${f.id}" ${(palace && palace.collectionId === f.id) || (app.editingCollectionId && !isEdit && app.editingCollectionId === f.id) ? 'selected' : ''}>${esc(f.name)}</option>`).join('')}
          </select>
        </div>` : ''}
        <div class="flex gap-8 mt-16">
          <button class="btn-primary" data-action="save-palace">${isEdit ? 'Gem ændringer' : 'Opret Palads'}</button>
          <button class="btn-ghost" data-action="back-from-editor">Annuller</button>
        </div>
      </div>`;

    showView('view-palace-editor');
    document.getElementById('editor-name').focus();
  }

  // PALADS-DETALJER
  function renderPalaceDetail() {
    const el = document.getElementById('view-palace-detail');
    const p = getPalace(app.editingPalaceId);
    if (!p) { renderView('dashboard'); return; }

    const due = isDue(p);
    const nextStr = p.srs && p.srs.lastReviewDate
      ? daysUntil(p.srs.nextReviewDate)
      : 'Nu';

    let html = `
      <button class="back-btn" data-action="${p.collectionId ? 'back-to-collection' : 'go-dashboard'}">&#8592; ${p.collectionId && getCollection(p.collectionId) ? esc(getCollection(p.collectionId).name) : 'Alle Paladser'}</button>
      <div class="palace-detail-header">
        <div class="flex" style="justify-content:space-between;align-items:flex-start;gap:12px;">
          <div>
            <h1>${esc(p.name)}</h1>
            <p class="muted">${esc(p.description)}</p>
          </div>
          <button class="btn-teal" data-action="start-review" data-palace-id="${p.id}">&#9654; Gennemgå</button>
        </div>
        <div class="palace-detail-srs">
          <span>&#128336; Næste gennemgang: <span class="${due ? 'srs-due' : ''}">${nextStr}</span></span>
          ${p.srs && p.srs.lastReviewDate ? `<span>&#10003; Sidst gennemgået: ${formatDate(p.srs.lastReviewDate)}</span>` : ''}
          <span>&#127381; Interval: ${p.srs ? p.srs.interval : 1} dag${(p.srs && p.srs.interval !== 1) ? 'e' : ''}</span>
        </div>
      </div>

      <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:10px;margin-top:18px;">
        <h2 style="font-size:16px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;">Rum (${(p.rooms||[]).length})</h2>
        ${app.authenticated ? `<button class="btn-ghost btn-sm" data-action="show-add-room" data-palace-id="${p.id}">+ Nyt Rum</button>` : ''}
      </div>
      <div id="add-room-area"></div>`;

    const rooms = p.rooms || [];
    rooms.forEach(room => {
      const roomLocs = p.locations.filter(l => l.roomId === room.id);
      const isEditingRoom = app.editingRoomId === room.id;
      const isCollapsed = app.collapsedRooms.has(room.id);
      html += `<div class="room-section">
        <div class="room-header" style="${isCollapsed ? 'border-bottom:none;' : ''}">`;
      if (isEditingRoom) {
        html += `<input type="text" id="edit-room-name-${room.id}" value="${esc(room.name)}" style="flex:1;background:var(--surface-raised);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);">
          <button class="btn-primary btn-sm" data-action="save-room-edit" data-palace-id="${p.id}" data-room-id="${room.id}">Gem</button>
          <button class="btn-ghost btn-sm" data-action="cancel-room-edit">Annuller</button>`;
      } else {
        html += `<button class="btn-icon" data-action="toggle-room-collapse" data-room-id="${room.id}" title="${isCollapsed ? 'Udvid' : 'Minimer'}" style="font-size:10px;padding:2px 4px;">${isCollapsed ? '&#9654;' : '&#9660;'}</button>
          <span class="room-name">${esc(room.name)}</span>
          <div style="display:flex;gap:6px;align-items:center;margin-left:auto;">
            <button class="btn-ghost btn-sm" data-action="start-review" data-palace-id="${p.id}" data-room-id="${room.id}">&#9654; Øv rum</button>
            ${app.authenticated ? `<button class="btn-icon" data-action="edit-room" data-palace-id="${p.id}" data-room-id="${room.id}" title="Omdøb">&#9998;</button>
            <button class="btn-icon" data-action="delete-room" data-palace-id="${p.id}" data-room-id="${room.id}" title="Slet rum" style="color:var(--danger)">&#128465;</button>` : ''}
          </div>`;
      }
      html += `</div>`;
      if (isCollapsed) { html += `</div>`; return; }

      // ── RUMKORT ──
      if (room.mapImage) {
        const isPinning = app.pinningRoomId === room.id;
        const nextUnpinned = roomLocs.find(l => !l.pin);
        html += `<div class="room-map-wrap">
          <div class="room-map-container${isPinning ? ' pinning' : ''}"
               onclick="handleMapClick(event,'${p.id}','${room.id}')"
               id="map-${room.id}">
            <img src="${room.mapImage}" class="room-map-img" draggable="false">`;
        roomLocs.forEach((loc, i) => {
          if (!loc.pin) return;
          html += `<div class="map-pin" style="left:${loc.pin.x}%;top:${loc.pin.y}%;" title="${esc(loc.name)}">
            <div class="map-pin-num"><span>${i + 1}</span></div>
            ${isPinning ? `<button class="map-pin-del" onclick="event.stopPropagation();deletePinFromLoc('${p.id}','${loc.id}')" title="Fjern pin">✕</button>` : ''}
          </div>`;
        });
        html += `</div>
          <div class="room-map-toolbar">
            ${isPinning
              ? `<span class="map-hint">${nextUnpinned ? `Klik for at placere: <strong>${esc(nextUnpinned.name)}</strong>` : '✓ Alle pins placeret'}</span>
                 <button class="btn-primary btn-sm" onclick="exitPinMode()">Færdig</button>`
              : app.authenticated ? `<button class="btn-ghost btn-sm" onclick="enterPinMode('${room.id}')">&#128204; Placer Pins</button>
                 <button class="btn-ghost btn-sm" onclick="removeMapConfirm('${p.id}','${room.id}')" style="color:var(--muted);">Fjern Kort</button>` : ''
            }
          </div>
        </div>`;
      } else if (app.authenticated) {
        html += `<div style="padding:6px 14px 2px;">
          <label class="btn-ghost btn-sm" style="cursor:pointer;">
            &#128247; Upload Kort
            <input type="file" accept="image/*" style="display:none" onchange="handleMapUpload(event,'${p.id}','${room.id}')">
          </label>
        </div>`;
      }

      html += `<div class="room-locations">`;
      if (p.type === 'trivia') {
        roomLocs.forEach(loc => { html += renderTriviaCardHTML(p.id, loc); });
        html += app.authenticated ? `<div style="padding:6px 0 2px;">
          <button class="btn-ghost btn-sm" data-action="show-add-trivia" data-palace-id="${p.id}" data-room-id="${room.id}">+ Tilføj Spørgsmål</button>
        </div>` : '';
        html += `<div id="add-trivia-area-${room.id}"></div>`;
      } else {
        roomLocs.forEach(loc => {
          const idx = p.locations.indexOf(loc);
          html += renderLocationHTML(p.id, loc, idx, p.locations.length, rooms);
        });
        html += app.authenticated ? `<div style="padding:6px 0 2px;">
          <button class="btn-ghost btn-sm" data-action="show-add-location" data-room-id="${room.id}">+ Tilføj Sted</button>
        </div>` : '';
      }

      // Free notes inside room
      const roomNotes = room.notes || [];
      html += `<div class="room-notes-divider">Frie Erindringer</div>`;
      html += `<div id="add-note-area-${room.id}"></div>`;
      roomNotes.forEach(note => {
        if (app.editingNoteId === note.id) {
          html += `
          <div class="memory-item">
            <textarea id="edit-note-${note.id}" style="flex:1;" rows="1"
              onkeydown="handleNoteEditKeydown(event,'${p.id}','${room.id}','${note.id}')"
              oninput="autoResizeTextarea(this)">${esc(note.text)}</textarea>
            <button class="btn-primary btn-sm" data-action="save-note-edit" data-palace-id="${p.id}" data-room-id="${room.id}" data-note-id="${note.id}">Gem</button>
            <button class="btn-ghost btn-sm" data-action="cancel-note-edit">Annuller</button>
          </div>`;
        } else {
          html += `
          <div class="memory-item">
            <span class="memory-text">${escLines(note.text)}</span>
            ${app.authenticated ? `<button class="btn-icon" data-action="edit-note" data-palace-id="${p.id}" data-room-id="${room.id}" data-note-id="${note.id}" title="Rediger">&#9998;</button>
            <button class="btn-icon" data-action="delete-note" data-palace-id="${p.id}" data-room-id="${room.id}" data-note-id="${note.id}" title="Slet" style="color:var(--danger)">&#10005;</button>` : ''}
          </div>`;
        }
      });
      if (roomNotes.length === 0) {
        html += `<p style="color:var(--muted);font-size:13px;padding:4px 0;">Ingen frie erindringer endnu.</p>`;
      }
      html += `<div style="padding:4px 0 6px;">
        ${app.authenticated ? `<button class="btn-ghost btn-sm" data-action="show-add-note" data-palace-id="${p.id}" data-room-id="${room.id}">+ Tilføj Erindring</button>` : ''}
      </div>
      </div></div>`;
    });

    if (p.type !== 'trivia') {
      const unassigned = p.locations.filter(l => !l.roomId || !rooms.find(r => r.id === l.roomId));
      html += `
        <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:14px;margin-top:${rooms.length > 0 ? '18px' : '0'};">
          <h2 style="font-size:16px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;">Steder uden rum (${unassigned.length})</h2>
          ${app.authenticated ? `<button class="btn-ghost btn-sm" data-action="show-add-location">+ Tilføj Sted</button>` : ''}
        </div>
        <div id="add-location-area"></div>
        <div class="locations-list">`;
      if (unassigned.length === 0) {
        html += `<div class="empty-state" style="padding:20px 0;"><p style="color:var(--muted)">Ingen steder uden rum.</p></div>`;
      } else {
        unassigned.forEach(loc => {
          const idx = p.locations.indexOf(loc);
          html += renderLocationHTML(p.id, loc, idx, p.locations.length, rooms);
        });
      }
      html += `</div>`;
    }
    el.innerHTML = html;
    showView('view-palace-detail');
  }

  function renderTriviaCardHTML(palaceId, loc) {
    const answer   = loc.memories.find(m => !m.text.startsWith('🧠'));
    const mnemonic = loc.memories.find(m =>  m.text.startsWith('🧠'));
    if (app.editingLocId === loc.id) {
      return `
      <div class="trivia-card" id="loc-${loc.id}">
        <div style="display:flex;flex-direction:column;gap:6px;">
          <input type="text" id="tri-q-${loc.id}" value="${esc(loc.name)}" placeholder="Spørgsmål..." style="font-weight:600;">
          <input type="text" id="tri-a-${loc.id}" value="${esc(answer ? answer.text : '')}" placeholder="Svar...">
          <input type="text" id="tri-m-${loc.id}" value="${esc(mnemonic ? mnemonic.text.replace(/^🧠\s*/,'') : '')}" placeholder="🧠 Mnemonisk note (valgfrit)..." style="font-size:13px;color:var(--muted);">
          <div style="display:flex;gap:6px;">
            <button class="btn-primary btn-sm" data-action="save-trivia-edit" data-palace-id="${palaceId}" data-loc-id="${loc.id}">Gem</button>
            <button class="btn-ghost btn-sm" data-action="cancel-loc-edit">Annuller</button>
          </div>
        </div>
      </div>`;
    }
    return `
    <div class="trivia-card" id="loc-${loc.id}">
      <div class="trivia-q">
        <span>${escFlag(loc.name)}</span>
        ${app.authenticated ? `<div style="display:flex;gap:4px;flex-shrink:0;">
          <button class="btn-icon" data-action="edit-loc" data-palace-id="${palaceId}" data-loc-id="${loc.id}" title="Rediger">&#9998;</button>
          <button class="btn-icon" data-action="delete-loc" data-palace-id="${palaceId}" data-loc-id="${loc.id}" title="Slet" style="color:var(--danger)">&#128465;</button>
        </div>` : ''}
      </div>
      ${answer   ? `<div class="trivia-a">${esc(answer.text)}</div>` : ''}
      ${mnemonic ? `<div class="trivia-m">${esc(mnemonic.text)}</div>` : ''}
    </div>`;
  }

  function renderLocationHTML(palaceId, loc, idx, total, rooms) {
    const isEditingLoc = app.editingLocId === loc.id;
    const palace = getPalace(palaceId);
    rooms = rooms || [];
    const roomOptions = `<option value="">— Intet rum —</option>` +
      rooms.map(r => `<option value="${r.id}"${loc.roomId === r.id ? ' selected' : ''}>${esc(r.name)}</option>`).join('');
    let html = `
      <div class="location-item" id="loc-${loc.id}">
        <div class="location-header">
          <div class="location-number">${idx + 1}</div>`;

    if (isEditingLoc) {
      const coordLat = loc.coords ? loc.coords.lat : '';
      const coordLng = loc.coords ? loc.coords.lng : '';
      html += `
          <div class="inline-edit-form" style="flex:1">
            <input type="text" id="edit-loc-name-${loc.id}" value="${esc(loc.name)}">
            ${palace && palace.routePalace ? `
            <input type="text" id="edit-loc-coords-${loc.id}" value="${coordLat && coordLng ? coordLat + ', ' + coordLng : ''}" placeholder="Koordinater fra Google Maps (fx 55.6347, 12.6526)" style="font-size:12px;margin-top:4px;">` : ''}
            <button class="btn-primary btn-sm" data-action="save-loc-edit" data-palace-id="${palaceId}" data-loc-id="${loc.id}">Gem</button>
            <button class="btn-ghost btn-sm" data-action="cancel-loc-edit">Annuller</button>
          </div>`;
    } else {
      html += `
          <span class="location-name"${app.authenticated ? ` data-action="edit-loc" data-palace-id="${palaceId}" data-loc-id="${loc.id}"` : ''}>${escFlag(loc.name)}</span>
          ${loc.coords ? `<span title="Satellit-koordinater gemt (${loc.coords.lat}, ${loc.coords.lng})" style="font-size:13px;opacity:0.6;flex-shrink:0;">&#128506;</span>` : ''}
          ${app.authenticated ? `<div class="location-actions">
            ${rooms.length > 0 ? `<select class="room-select" data-action="assign-loc-room" data-palace-id="${palaceId}" data-loc-id="${loc.id}" title="Rum">${roomOptions}</select>` : ''}
            ${idx > 0 ? `<button class="btn-icon" title="Flyt op" data-action="move-loc-up" data-palace-id="${palaceId}" data-loc-id="${loc.id}">&#9650;</button>` : ''}
            ${idx < total - 1 ? `<button class="btn-icon" title="Flyt ned" data-action="move-loc-down" data-palace-id="${palaceId}" data-loc-id="${loc.id}">&#9660;</button>` : ''}
            <button class="btn-icon" title="Rediger" data-action="edit-loc" data-palace-id="${palaceId}" data-loc-id="${loc.id}">&#9998;</button>
            <button class="btn-icon" title="Slet" data-action="delete-loc" data-palace-id="${palaceId}" data-loc-id="${loc.id}" style="color:var(--danger)">&#128465;</button>
          </div>` : ''}`;
    }

    html += `</div>`;
    if (palace && palace.routePalace && loc.coords) {
      const R = 0.0010;
      const bbox = `${loc.coords.lng - R},${loc.coords.lat - R},${loc.coords.lng + R},${loc.coords.lat + R}`;
      const imgUrl = `https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/export?bbox=${bbox}&bboxSR=4326&size=400,240&imageSR=4326&format=png&transparent=false&f=image`;
      html += `<div class="loc-sat-strip" onclick="showSatOverlay(${loc.coords.lat},${loc.coords.lng})" title="Klik for at forstørre">
        <img src="${imgUrl}" loading="lazy" alt="" onload="this.style.opacity=1">
        <div class="loc-sat-strip-pin">📌</div>
        <div class="loc-sat-strip-hint">🔍 Forstør</div>
      </div>`;
    }
    html += `<div class="location-memories">`;

    loc.memories.forEach(mem => {
      if (app.editingMemId === mem.id) {
        html += `
        <div class="memory-item">
          <textarea id="edit-mem-${mem.id}" style="flex:1;" rows="1"
            onkeydown="handleMemEditKeydown(event,'${palaceId}','${loc.id}','${mem.id}')"
            oninput="autoResizeTextarea(this)">${esc(mem.text)}</textarea>
          <button class="btn-primary btn-sm" data-action="save-mem-edit" data-palace-id="${palaceId}" data-loc-id="${loc.id}" data-mem-id="${mem.id}">Gem</button>
          <button class="btn-ghost btn-sm" data-action="cancel-mem-edit">Annuller</button>
        </div>`;
      } else {
        html += `
        <div class="memory-item">
          <span class="memory-text">${escLines(mem.text)}</span>
          ${app.authenticated ? `<button class="btn-icon" data-action="edit-memory" data-palace-id="${palaceId}" data-loc-id="${loc.id}" data-mem-id="${mem.id}" title="Rediger erindring">&#9998;</button>
          <button class="btn-icon" data-action="delete-memory" data-palace-id="${palaceId}" data-loc-id="${loc.id}" data-mem-id="${mem.id}" title="Slet erindring" style="color:var(--danger)">&#10005;</button>` : ''}
        </div>`;
      }
    });

    html += (app.authenticated ? `
        <div class="add-memory-form">
          <div style="display:flex;gap:6px;flex:1;flex-direction:column;">
            <textarea id="mem-input-${loc.id}" placeholder="Erindring… (Shift+Enter for at tilføje)" rows="1"
              onkeydown="handleMemKeydown(event,'${palaceId}','${loc.id}')"
              oninput="autoResizeTextarea(this)"></textarea>
            <textarea id="mem-mnemonic-${loc.id}" placeholder="🧠 Mnemonisk note (valgfrit)…" rows="1"
              style="font-size:13px;color:var(--muted);"
              onkeydown="handleMnemonicKeydown(event,'${palaceId}','${loc.id}')"
              oninput="autoResizeTextarea(this)"
              onblur="setTimeout(()=>autoSaveMnemonic('${palaceId}','${loc.id}'),150)"></textarea>
          </div>
          <button class="btn-ghost btn-sm" data-action="add-memory" data-palace-id="${palaceId}" data-loc-id="${loc.id}" style="align-self:flex-start;margin-top:2px;">Tilføj</button>
        </div>` : '') + `
      </div></div>`;

    return html;
  }

  // GENNEMGANG
  function renderReviewSession() {
    const el = document.getElementById('view-review-session');
    const p = getPalace(app.reviewPalaceId);
    if (!p) { renderView('dashboard'); return; }

    const locs = getReviewLocs(p);
    if (locs.length === 0 || app.reviewLocIdx >= locs.length) {
      renderView('dashboard');
      return;
    }

    const loc = locs[app.reviewLocIdx];
    const progress = ((app.reviewLocIdx + 1) / locs.length) * 100;
    let rangeLabel = '';
    if (app.reviewRoomId) {
      rangeLabel = ` · ${esc(getRoomName(p, app.reviewRoomId))}`;
    } else if (app.reviewLocEnd !== null) {
      rangeLabel = ` · ${locs[0].name}–${locs[locs.length - 1].name}`;
    }

    let html = `
      <button class="back-btn" data-action="back-from-review">&#8592; ${esc(p.name)}</button>
      <div class="review-progress">
        <div class="review-progress-bar" style="width:${progress}%"></div>
      </div>
      <div style="text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px;">
        Sted ${app.reviewLocIdx + 1} af ${locs.length} &nbsp;&bull;&nbsp; ${esc(p.name)}${rangeLabel}${app.reviewQueue.length > 1 ? ` &nbsp;&bull;&nbsp; Palads ${app.reviewQueueIdx + 1}/${app.reviewQueue.length}` : ''}
      </div>

      <div class="review-card">
        <div class="review-card-inner${app.reviewRevealed ? ' flipped' : ''}" id="review-card-inner">
          <div class="review-card-face${p.routePalace && loc.coords ? ' has-sat-img' : ''}">
            ${p.routePalace && loc.coords ? (() => {
              const R = 0.0010;
              const bbox = `${loc.coords.lng - R},${loc.coords.lat - R},${loc.coords.lng + R},${loc.coords.lat + R}`;
              const imgUrl = `https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/export?bbox=${bbox}&bboxSR=4326&size=400,240&imageSR=4326&format=png&transparent=false&f=image`;
              return `<div class="review-sat-wrap">
                <div class="review-sat-loading" id="rev-sat-loading">Henter satellit&#8203;billede&#8230;</div>
                <img src="${imgUrl}" alt="" onload="this.style.opacity=1;document.getElementById('rev-sat-loading').style.display='none';" onerror="document.getElementById('rev-sat-loading').textContent='Ingen forbindelse';" style="opacity:0;transition:opacity 0.3s;">
                <div class="review-sat-crosshair">📌</div>
                <div class="review-sat-badge">© Esri</div>
              </div>
              <div class="review-sat-body">
                <div class="review-loc-name">${escFlag(loc.name)}</div>
                <div class="review-tap-hint">Hvilke erindringer er placeret her?</div>
              </div>`;
            })() : `
            ${p.type === 'trivia' ? `<div class="review-loc-number">Spørgsmål ${app.reviewLocIdx + 1}</div>` : ''}
            <div class="review-loc-name">${escFlag(loc.name)}</div>
            <div class="review-tap-hint">${p.type === 'trivia' ? 'Hvad er svaret?' : 'Hvilke erindringer er placeret her?'}</div>`}
          </div>
          <div class="review-card-face review-card-back">`;
    {
      const regularMems  = loc.memories.filter(m => !m.text.startsWith('🧠'));
      const mnemonicMems = loc.memories.filter(m =>  m.text.startsWith('🧠'));
      const totalLines   = loc.memories.reduce((s, m) => s + m.text.split('\n').length, 0);
      const sizeClass    = totalLines <= 3 ? 'size-lg' : totalLines <= 6 ? 'size-md' : totalLines <= 12 ? 'size-sm' : 'size-xs';
      function renderItems(mems) {
        return mems.map(m => {
          const parts = m.text.split('\n').filter(l => l.trim());
          if (parts.length > 1) return parts.map(l => `<div class="review-memory-item"><div class="review-memory-dot"></div><div>${esc(l.trim())}</div></div>`).join('');
          return `<div class="review-memory-item"><div class="review-memory-dot"></div><div>${escLines(m.text)}</div></div>`;
        }).join('');
      }
      const mainMems = regularMems.length ? regularMems : mnemonicMems;
      html += `<div style="display:flex;flex-direction:column;height:100%;width:100%;">`;
      html += `<div><div class="review-back-label">${p.type === 'trivia' ? 'Svar' : `Erindringer ved ${escFlag(loc.name)}`}</div>`;
      html += `<div class="review-memories-list ${sizeClass}">${loc.memories.length === 0 ? '<p style="color:var(--muted);font-style:italic">Ingen erindringer gemt her endnu.</p>' : renderItems(mainMems)}</div></div>`;
      if (mnemonicMems.length && regularMems.length) {
        html += `<div style="margin-top:auto;padding-top:14px;border-top:1px solid rgba(221,228,239,0.8);"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;opacity:0.7;">Mnemonisk note</div><div class="review-memories-list size-sm">${renderItems(mnemonicMems)}</div></div>`;
      }
      html += `</div>`;
    }
    html += `
          </div>
        </div>
      </div>

      <div class="review-nav">`;

    const hasNextLoc = locs.slice(app.reviewLocIdx + 1).some(l => l.memories.length > 0);
    if (!app.reviewRevealed) {
      html += `<button class="btn-teal" data-action="reveal-review">Afslør Erindringer</button>`;
    } else {
      if (hasNextLoc) {
        html += `<button class="btn-primary" data-action="next-review-loc">Næste Sted &#8594;</button>`;
      } else if (app.reviewQueue.length > 0 && app.reviewQueueIdx + 1 < app.reviewQueue.length) {
        html += `<button class="btn-primary" data-action="finish-review">Næste Palads &#8594;</button>`;
      } else {
        html += `<button class="btn-primary" data-action="finish-review">Afslut Gennemgang &#10003;</button>`;
      }
    }

    html += `
        <button class="btn-ghost" data-action="skip-review">Spring over</button>
      </div>

      `;

    el.innerHTML = html;
    showView('view-review-session');

    // Forudindlæs satellit-billeder for de næste 2 stop
    if (p.routePalace) {
      const locs2 = getReviewLocs(p);
      [1, 2].forEach(offset => {
        const next = locs2[app.reviewLocIdx + offset];
        if (next && next.coords) {
          const R = 0.0010;
          const b = `${next.coords.lng-R},${next.coords.lat-R},${next.coords.lng+R},${next.coords.lat+R}`;
          new Image().src = `https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/export?bbox=${b}&bboxSR=4326&size=400,240&imageSR=4326&format=png&transparent=false&f=image`;
        }
      });
    }
  }

  function completeReview() {
    const p = getPalace(app.reviewPalaceId);
    if (!p) return;
    const interval = data.settings.reviewIntervalDays || 30;
    p.srs = {
      ...p.srs,
      interval,
      repetition: (p.srs.repetition || 0) + 1,
      nextReviewDate: Date.now() + interval * 86400000,
      lastReviewDate: Date.now(),
      history: [...(p.srs.history || []), { date: Date.now(), intervalAfter: interval }]
    };
    saveData();
  }

  // ── HÆNDELSESHÅNDTERING ────────────────────────────────────────────
  document.addEventListener('change', function (e) {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    if (el.dataset.action === 'assign-loc-room') {
      if (!app.authenticated) { showLoginModal(null); return; }
      assignLocRoom(el.dataset.palaceId, el.dataset.locId, el.value || null);
      renderPalaceDetail();
    }
  });

  document.addEventListener('click', function (e) {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.dataset.action;
    const palaceId = el.dataset.palaceId;
    const locId = el.dataset.locId;
    const memId = el.dataset.memId;

    const EDIT_ACTIONS = new Set([
      'new-palace','edit-palace','delete-palace','save-palace',
      'show-add-location','add-location','save-loc-edit','delete-loc','edit-loc','move-loc-up','move-loc-down',
      'show-add-room','save-room-edit','edit-room','delete-room',
      'add-memory','edit-memory','save-mem-edit','delete-memory',
      'show-add-note','save-note-edit','edit-note','delete-note',
      'show-add-trivia','save-trivia-edit'
    ]);
    if (EDIT_ACTIONS.has(action) && !app.authenticated) {
      showLoginModal(() => el.click());
      return;
    }

    switch (action) {
      case 'new-palace':
        app.editingPalaceId = null;
        renderView('palace-editor');
        break;

      case 'edit-palace':
        app.editingPalaceId = palaceId;
        renderView('palace-editor');
        break;

      case 'view-palace':
        app.editingPalaceId = palaceId;
        renderView('palace-detail');
        break;

      case 'delete-palace':
        if (confirm('Slet dette palads og alle dets steder og erindringer?')) {
          deletePalace(palaceId);
          if (app.editingCollectionId) renderView('collection-detail');
          else renderView('dashboard');
        }
        break;

      case 'save-palace': {
        const name = document.getElementById('editor-name').value.trim();
        if (!name) { alert('Angiv venligst et navn til paladstet.'); return; }
        const desc = document.getElementById('editor-desc').value;
        const type = document.querySelector('input[name="palace-type"]:checked')?.value || 'standard';
        const collectionEl = document.getElementById('editor-collection');
        const collectionId = collectionEl ? collectionEl.value || undefined : undefined;
        const routePalace = document.getElementById('editor-route-palace')?.checked || false;
        if (app.editingPalaceId) {
          updatePalace(app.editingPalaceId, { name, description: desc, type, collectionId: collectionId || undefined, routePalace });
          if (app.editingCollectionId) renderView('collection-detail');
          else renderView('palace-detail');
        } else {
          const p = createPalace(name, desc, type);
          if (collectionId) p.collectionId = collectionId;
          if (routePalace) p.routePalace = true;
          saveData();
          app.editingPalaceId = p.id;
          if (collectionId) { app.editingCollectionId = collectionId; renderView('collection-detail'); }
          else renderView('palace-detail');
        }
        break;
      }

      case 'back-from-editor': {
        const backPalace = app.editingPalaceId ? getPalace(app.editingPalaceId) : null;
        if (backPalace && backPalace.collectionId) { app.editingCollectionId = backPalace.collectionId; renderView('collection-detail'); }
        else if (app.editingCollectionId) renderView('collection-detail');
        else if (app.editingPalaceId) renderView('palace-detail');
        else renderView('dashboard');
        break;
      }

      case 'new-collection':
        app.editingCollectionId = null;
        renderView('collection-editor');
        break;

      case 'edit-collection':
        app.editingCollectionId = el.dataset.collectionId;
        renderView('collection-editor');
        break;

      case 'delete-collection': {
        const fDel = getCollection(el.dataset.collectionId);
        if (!fDel) break;
        const fpsCount = data.palaces.filter(p => p.collectionId === fDel.id).length;
        const msg = fpsCount > 0
          ? `Slet samlingen "${fDel.name}"? De ${fpsCount} paladser i samlingen flyttes tilbage til løse paladser.`
          : `Slet samlingen "${fDel.name}"?`;
        if (confirm(msg)) { deleteCollection(fDel.id); renderView('dashboard'); }
        break;
      }

      case 'save-collection': {
        const fname = document.getElementById('collection-editor-name').value.trim();
        if (!fname) { alert('Angiv venligst et navn til samlingen.'); return; }
        const fdesc = document.getElementById('collection-editor-desc').value;
        if (app.editingCollectionId && getCollection(app.editingCollectionId)) {
          updateCollection(app.editingCollectionId, { name: fname, description: fdesc });
          renderView('collection-detail');
        } else {
          const nf = createCollection(fname, fdesc);
          app.editingCollectionId = nf.id;
          renderView('collection-detail');
        }
        break;
      }

      case 'open-collection':
        app.editingCollectionId = el.dataset.collectionId;
        renderView('collection-detail');
        break;

      case 'review-all-in-collection': {
        const rcColId = el.dataset.collectionId;
        const rcPalaces = data.palaces.filter(p => p.collectionId === rcColId);
        if (rcPalaces.length === 0) break;
        const rcQueue = rcPalaces.map(p => p.id);
        app.reviewQueue = rcQueue;
        app.reviewQueueIdx = 0;
        app.reviewPalaceId = rcQueue[0];
        app.reviewLocStart = 0; app.reviewLocEnd = null; app.reviewRoomId = null; app.reviewRevealed = false;
        const rcPal = getPalace(rcQueue[0]);
        const rcLocs = getReviewLocs(rcPal);
        let rcFirst = 0;
        while (rcFirst < rcLocs.length && rcLocs[rcFirst].memories.length === 0) rcFirst++;
        app.reviewLocIdx = rcFirst;
        renderView('review-session');
        break;
      }

      case 'back-from-collection':
        renderView('dashboard');
        break;

      case 'back-from-collection-editor':
        if (app.editingCollectionId && getCollection(app.editingCollectionId)) renderView('collection-detail');
        else renderView('dashboard');
        break;

      case 'new-palace-in-collection':
        app.editingCollectionId = el.dataset.collectionId;
        app.editingPalaceId = null;
        renderView('palace-editor');
        break;

      case 'back-to-collection': {
        const bPalace = getPalace(app.editingPalaceId);
        if (bPalace && bPalace.collectionId) app.editingCollectionId = bPalace.collectionId;
        renderView('collection-detail');
        break;
      }

      case 'go-dashboard':
        app.editingCollectionId = null;
        renderView('dashboard');
        break;

      case 'show-add-location': {
        const targetRoomId = el.dataset.roomId || '';
        const targetArea = targetRoomId
          ? document.querySelector(`[data-add-loc-room="${targetRoomId}"]`) || document.getElementById('add-location-area')
          : document.getElementById('add-location-area');
        // Use the room's inline area if available, otherwise the main area
        const areaEl = document.getElementById('add-location-area');
        areaEl.innerHTML = `
          <div class="add-location-form">
            <div class="form-row">
              <input type="text" id="new-loc-name" placeholder="Stednavn (fx Hoveddør)" onkeydown="handleLocKeydown(event,'${app.editingPalaceId}','${targetRoomId}')">
              <button class="btn-primary btn-sm" data-action="add-location" data-palace-id="${app.editingPalaceId}" data-room-id="${targetRoomId}">Tilføj</button>
              <button class="btn-ghost btn-sm" data-action="cancel-add-location">Annuller</button>
            </div>
          </div>`;
        // scroll to and focus
        areaEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        document.getElementById('new-loc-name').focus();
        break;
      }

      case 'cancel-add-location': {
        const area = document.getElementById('add-location-area');
        if (area) area.innerHTML = '';
        break;
      }

      case 'add-location': {
        const nameEl = document.getElementById('new-loc-name');
        const name = nameEl ? nameEl.value.trim() : '';
        if (!name) return;
        const locRoomId = el.dataset.roomId || null;
        addLocation(app.editingPalaceId, name, locRoomId || undefined);
        renderPalaceDetail();
        break;
      }

      case 'edit-loc':
        app.editingLocId = locId;
        renderPalaceDetail();
        setTimeout(() => {
          const inp = document.getElementById(`edit-loc-name-${locId}`);
          if (inp) inp.focus();
        }, 50);
        break;

      case 'cancel-loc-edit':
        app.editingLocId = null;
        renderPalaceDetail();

        overlay.appendChild(inner);
        document.body.appendChild(overlay);
        function startFromPicker(roomId) {
          overlay.remove();
          app.reviewPalaceId = palaceId; app.reviewRoomId = roomId || null;
          app.reviewLocStart = 0; app.reviewLocEnd = null; app.reviewRevealed = false;
          const ll2 = getReviewLocs(pal0); let fi2 = 0;
          while (fi2 < ll2.length && ll2[fi2].memories.length === 0) fi2++;
          app.reviewLocIdx = fi2;
          renderView('review-session');

        inner.querySelector('#rp-all').onclick = () => startFromPicker(null);

        app.reviewPalaceId = palaceId;

      case 'next-review-loc': {
        const pal = getPalace(app.reviewPalaceId);

        let next = app.reviewLocIdx + 1;
        while (next < locs3.length && locs3[next].memories.length === 0) next++;
        app.reviewLocIdx = next;
        app.reviewRevealed = false;
        renderReviewSession();
        break;

        if (app.reviewQueue.length > 0 && app.reviewQueueIdx + 1 < app.reviewQueue.length) {

          app.reviewLocStart = 0; app.reviewLocEnd = null; app.reviewRoomId = null; app.reviewRevealed = false;

        } else {

          if (app.editingCollectionId) renderView('collection-detail');
          else renderView('dashboard');

        break;

      case 'skip-review':
        app.reviewQueue = []; app.reviewQueueIdx = 0;
        if (app.editingCollectionId) renderView('collection-detail');
        else renderView('dashboard');
        break;

      case 'toggle-review-peg':
        app.reviewPegOpen = !app.reviewPegOpen;
        renderReviewSession();
        break;

    }

  // ── TASTATURNAVIGATION I REVIEW ────────────────────────────────────
  document.addEventListener('keydown', function(e) {
    if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
    if (app.view === 'review-session') {
      if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowRight') {
        e.preventDefault();
        if (!app.reviewRevealed) {
          app.reviewRevealed = true;
          renderReviewSession();
        } else {
          const btn = document.querySelector('[data-action="next-review-loc"]') ||
                      document.querySelector('[data-action="finish-review"]');
          if (btn) btn.click();
        }
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        const p2 = getPalace(app.reviewPalaceId);
        const locs2 = p2 ? getReviewLocs(p2) : [];
        let prev = app.reviewLocIdx - 1;
        while (prev >= 0 && locs2[prev].memories.length === 0) prev--;
        if (prev >= 0) {
          app.reviewLocIdx = prev;
          app.reviewRevealed = false;
          renderReviewSession();
        }
      }
    }
  });

  // ── TASTATURGENVEJE ────────────────────────────────────────────────
  window.handleMemKeydown = function (e, palaceId, locId) {
    if (e.key !== 'Enter' || !e.shiftKey) return;
    e.preventDefault();
    const textInp     = document.getElementById(`mem-input-${locId}`);
    const mnemonicInp = document.getElementById(`mem-mnemonic-${locId}`);
    const text     = textInp     ? textInp.value.trim()     : '';
    const mnemonic = mnemonicInp ? mnemonicInp.value.trim() : '';
    if (!text && !mnemonic) return;
    if (text) {
      addMemory(palaceId, locId, text, mnemonic);
    } else {
      const loc = getLoc(palaceId, locId);
      if (loc) { loc.memories.push({ id: genId(), text: '🧠 ' + mnemonic, createdAt: Date.now() }); saveData(); }
    }
    renderPalaceDetail();
  };

  window.handleMnemonicKeydown = function(e, palaceId, locId) {
    if (e.key === 'Enter' && e.shiftKey) { handleMemKeydown(e, palaceId, locId); return; }
    if (e.key !== 'Tab') return;
    e.preventDefault();
    const mnemonicInp = document.getElementById(`mem-mnemonic-${locId}`);
    const mnemonic = mnemonicInp ? mnemonicInp.value.trim() : '';
    if (mnemonic) {
      const textInp = document.getElementById(`mem-input-${locId}`);
      const text = textInp ? textInp.value.trim() : '';
      if (text) {
        addMemory(palaceId, locId, text, mnemonic);
      } else {
        const loc = getLoc(palaceId, locId);
        if (loc) { loc.memories.push({ id: genId(), text: '🧠 ' + mnemonic, createdAt: Date.now() }); saveData(); }
      }
      if (mnemonicInp) mnemonicInp.value = ''; // Tøm så blur-autosave ikke dobbelt-gemmer
    }
    const all = Array.from(document.querySelectorAll('[id^="mem-mnemonic-"]'));
    const idx = all.findIndex(el => el.id === `mem-mnemonic-${locId}`);
    const next = all[e.shiftKey ? idx - 1 : idx + 1];
    if (next) next.focus();
  };

  window.handleMapClick = function(e, palaceId, roomId) {

    const p = getPalace(palaceId);
    const roomLocs = p.locations.filter(l => l.roomId === roomId);
    const nextLoc = roomLocs.find(l => !l.pin);
    if (!nextLoc) return;
    const container = e.currentTarget;
    const rect = container.getBoundingClientRect();
    const x = parseFloat((((e.clientX - rect.left) / rect.width) * 100).toFixed(2));
    const y = parseFloat((((e.clientY - rect.top) / rect.height) * 100).toFixed(2));
    setLocationPin(palaceId, nextLoc.id, x, y);

  // ── HTML-ESCAPE ────────────────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── LEITNER ENGINE ────────────────────────────────────────────────────
  const LEITNER_INTERVALS = [0, 1, 2, 4, 8, 16]; // dage per bunke 1-5

  function _dayStart(ts) {
    const d = new Date(ts); d.setHours(0,0,0,0); return d.getTime();
  }

  function _getLeitnerState(num) {
    if (!data.settings.pegLeitner[num]) {
      data.settings.pegLeitner[num] = { box: 1, nextReview: _dayStart(Date.now()) };
    }
    return data.settings.pegLeitner[num];
  }

  function _advanceLeitner(num, known) {
    const s = _getLeitnerState(num);
    s.box = known ? Math.min(5, s.box + 1) : 1;
    s.nextReview = _dayStart(Date.now()) + LEITNER_INTERVALS[s.box] * 864e5;
  }

  function _getDueCards() {
    const endOfToday = _dayStart(Date.now()) + 864e5;
    return data.settings.pegList.filter(([num]) => _getLeitnerState(num).nextReview < endOfToday);
  }

  function _getBoxCounts() {
    const counts = [0,0,0,0,0];
    for (const [num] of data.settings.pegList) counts[_getLeitnerState(num).box - 1]++;
    return counts;
  }

  function _getNextDueDate() {
    let earliest = Infinity;
    for (const [num] of data.settings.pegList) {
      const nr = _getLeitnerState(num).nextReview;
      if (nr < earliest) earliest = nr;
    }
    return earliest === Infinity ? null : earliest;
  }

  window.savePegList = function() {
    let changed = false;
    document.querySelectorAll('.peg-edit-input').forEach(inp => {
      const num = inp.dataset.pegNum;
      const val = inp.value.trim();
      if (!val) return;
      const entry = data.settings.pegList.find(([n]) => n === num);
      if (entry) { entry[1] = val; changed = true; }
    });
    if (changed) saveData();
    pegEditMode = false;
    renderPegList();
  };

  function _pegImgSrc(num) { return 'peg-images/peg-' + num + '.jpg'; }

  function _attachPdKeys() {
    if (_pdKeyHandler) document.removeEventListener('keydown', _pdKeyHandler);
    _pdKeyHandler = function(e) {
      if (document.getElementById('peg-drill-modal').style.display === 'none') return;
      if (!_pd) return;
      if (!_pd.flipped) {
        if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') { e.preventDefault(); flipPegCard(); }
      } else {
        if (e.key === 'ArrowLeft')  { e.preventDefault(); markPegCard(false); }
        if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') { e.preventDefault(); markPegCard(true); }

  const BOX_COLORS = ['#ef4444','#f8b116','#3b82f6','#8b5cf6','#22c55e'];

  function _boxBarChart(boxCounts, barH) {
    const total = data.settings.pegList.length || 1;
    const maxH = barH || 40;
    const bars = boxCounts.map((c,i) => {
      const h = Math.max(3, Math.round((c / total) * maxH));
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:0;">
        <div style="height:${maxH - h}px;"></div>
        <div style="width:100%;height:${h}px;background:${BOX_COLORS[i]};border-radius:3px 3px 0 0;"></div>
      </div>`;
    }).join('');
    const counts = boxCounts.map((c,i) =>
      `<div style="flex:1;text-align:center;font-size:11px;font-weight:700;color:${BOX_COLORS[i]};">${c}</div>`
    ).join('');
    const labels = boxCounts.map((_,i) =>
      `<div style="flex:1;text-align:center;font-size:10px;color:var(--muted);">B${i+1}</div>`
    ).join('');
    return `<div style="display:flex;gap:4px;height:${maxH}px;">${bars}</div>
            <div style="display:flex;gap:4px;margin-top:3px;">${counts}</div>
            <div style="display:flex;gap:4px;margin-top:1px;">${labels}</div>`;
  }

            </span>`;
          }).join('')
        : '<span style="color:var(--muted);font-size:13px;">Ingen data endnu.</span>';

      // Session-historik (seneste 10)
      const fmtDate = ts => new Date(ts).toLocaleDateString('da-DK',{day:'numeric',month:'short'});
      const sessionRows = history.slice(0,10).map(s => {
        const pct = s.total > 0 ? Math.round(s.correct / s.total * 100) : 0;
        const col = pct>=80?'#22c55e':pct>=50?'#f8b116':'#ef4444';
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);">
          <span style="font-size:12px;color:var(--muted);">${fmtDate(s.date)}</span>
          <span style="font-size:12px;">${s.total} kort</span>
          <span style="font-size:13px;font-weight:700;color:${col};">${pct}%</span>
        </div>`;
      }).join('');

      if (_pdKeyHandler) { document.removeEventListener('keydown', _pdKeyHandler); _pdKeyHandler = null; }
      inner.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <h2 style="font-size:17px;">&#128200; Leitner Statistik</h2>
          <button onclick="closePegDrill()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;">&#10005;</button>
        </div>
        <div style="text-align:center;margin-bottom:12px;padding:10px;background:var(--surface-raised);border-radius:8px;">
          <span style="font-size:11px;color:var(--muted);">Forfaldne i dag</span>
          <div style="font-size:28px;font-weight:800;color:${dueCount>0?'var(--accent)':'#22c55e'};">${dueCount > 0 ? dueCount : '✓'}</div>
          ${dueCount === 0 ? '<div style="font-size:11px;color:#22c55e;">Alt øvet for i dag</div>' : ''}
        </div>
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;">Bunkeoversigt</div>
        ${boxRows}
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:14px;margin-bottom:8px;">Svageste kort</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;">${weakHtml}</div>
        ${history.length > 0 ? `
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;">Seneste sessioner</div>
        <div style="max-height:160px;overflow-y:auto;">${sessionRows}</div>` : ''}
        <div style="margin-top:14px;">
          ${app.authenticated ? `<button class="btn-ghost" style="width:100%;" onclick="openPegDrill()">&#127183; Start øvelse</button>` : ''}
        </div>`;
    }
  }

  window.startPegDrill = function() {
    const mode = document.querySelector('input[name="pd-mode"]:checked').value;
    const sizeEl = document.querySelector('.pd-sz-active');
    const size = sizeEl ? parseInt(sizeEl.dataset.sz) : 10;
    const all = _getDueCards().sort(() => Math.random() - 0.5);
    if (all.length === 0) return;
    const deck = all.slice(0, size);
    _pd = { mode, deck, idx: 0, correct: 0, wrong: [], totalCount: deck.length, flipped: false };
    _renderPegDrill('card');
  };

  window.flipPegCard = function() {
    if (!_pd || _pd.flipped) return;
    _pd.flipped = true;
    const cardInner = document.getElementById('peg-card-inner');
    if (cardInner) cardInner.classList.add('flipped');
    const flipArea = document.getElementById('pd-flip-area');
    const markArea = document.getElementById('pd-mark-area');
    if (flipArea) flipArea.style.display = 'none';
    if (markArea) markArea.style.display = 'block';
  };

  window.markPegCard = function(known) {
    if (!_pd || !_pd.flipped) return;
    const entry = _pd.deck[_pd.idx];
    const [num] = entry;
    const prevBox = _getLeitnerState(num).box;
    _advanceLeitner(num, known);
    const newBox = _getLeitnerState(num).box;
    if (known) { _pd.correct++; }
    else { _pd.wrong.push({ entry, prevBox, newBox }); }
    _pd.idx++;
    _pd.flipped = false;
    if (_pd.idx >= _pd.deck.length) {
      _savePegSession();
      _renderPegDrill('result');
    } else {
      _renderPegDrill('card');
    }
  };

  function _savePegSession() {
    if (!_pd) return;
    if (!data.settings.pegLeitnerHistory) data.settings.pegLeitnerHistory = [];
    data.settings.pegLeitnerHistory.push({
      date: Date.now(),
      mode: _pd.mode,
      total: _pd.totalCount,
      correct: _pd.correct,
      wrongNums: _pd.wrong.map(({entry}) => entry[0])
    });
    // Behold de seneste 180 dages sessioner
    const cutoff = Date.now() - 180 * 864e5;
    data.settings.pegLeitnerHistory = data.settings.pegLeitnerHistory.filter(s => s.date >= cutoff);
    saveData();
  }

  window.openPegStats = function() {
    _renderPegDrill('stats');
    document.getElementById('peg-drill-modal').style.display = 'flex';
    const sidebar = document.getElementById('peg-sidebar');
    if (sidebar.classList.contains('open')) togglePegSidebar();
  };

  // ── LOGIN MODAL ────────────────────────────────────────────────────
  let _loginCallback = null;

  window.showLoginModal = function(callback) {
    _loginCallback = callback || null;
    document.getElementById('login-error').style.display = 'none';
    document.getElementById('login-code-input').value = '';
    document.getElementById('login-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('login-code-input').focus(), 50);
  };

  window.closeLoginModal = function() {
    document.getElementById('login-modal').style.display = 'none';
    _loginCallback = null;
  };

  const _PW_HASH = '808927a4db0b89e1ca292ccfe2a9dcc77ebbc6a96be7c7115a0980f7c3e9e776';
  async function _sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  window.submitLogin = async function() {
    const code = document.getElementById('login-code-input').value;
    const hash = await _sha256(code);
    if (hash === _PW_HASH) {
      app.authenticated = true;
      app.sessionPw = code;
      sessionStorage.setItem('_mp_session', code);
      const rememberMe = document.getElementById('login-remember-me');
      if (rememberMe && rememberMe.checked) {
        localStorage.setItem('_mp_remember', JSON.stringify({ pw: code, expires: Date.now() + 30 * 24 * 60 * 60 * 1000 }));
      }
      updateAuthButton();
      closeLoginModal();
      if (_loginCallback) { const cb = _loginCallback; _loginCallback = null; cb(); }
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('login-code-input').select();
    }
  };

  window.handleAuthBtn = function() {
    if (!app.authenticated) showLoginModal(null);
  };

  window.handleLogout = function() {
    app.authenticated = false;
    app.sessionPw = null;
    sessionStorage.removeItem('_mp_session');
    localStorage.removeItem('_mp_remember');
    closeSettingsModal();
    updateAuthButton();
    renderView('dashboard');
  };

  function updateAuthButton() {
    const authBtn = document.getElementById('auth-btn');
    const settingsBtn = document.getElementById('settings-btn');
    if (authBtn) authBtn.style.display = app.authenticated ? 'none' : '';
    if (settingsBtn) settingsBtn.style.display = app.authenticated ? '' : 'none';
  }

  document.getElementById('login-modal').addEventListener('click', function(e) {
    if (e.target === this) closeLoginModal();
  });

  // ── SETTINGS MODAL ─────────────────────────────────────────────────
  window.openSettingsModal = function() {
    document.getElementById('settings-interval-input').value = data.settings.reviewIntervalDays || 30;
    document.getElementById('settings-modal').style.display = 'flex';
  };

  window.closeSettingsModal = function() {
    document.getElementById('settings-modal').style.display = 'none';
  };

  window.saveSettings = function() {
    if (!app.authenticated) { closeSettingsModal(); showLoginModal(window.saveSettings); return; }
    const val = parseInt(document.getElementById('settings-interval-input').value, 10);
    if (val > 0) {
      data.settings.reviewIntervalDays = val;
      saveData();
      closeSettingsModal();
      renderView('dashboard');
    }
  };

  document.getElementById('settings-modal').addEventListener('click', function(e) {
    if (e.target === this) closeSettingsModal();
  });

  // ── EXCEL IMPORT/EXPORT ─────────────────────────────────────────────
  function exportToExcel() {
    if (data.palaces.length === 0) { alert('Ingen paladser at gemme.'); return; }
    const wb = XLSX.utils.book_new();

    // Meta-ark: beskrivelse og type per palads
    const metaRows = [['palads', 'beskrivelse', 'type']];
    for (const palace of data.palaces) {
      metaRows.push([palace.name, palace.description || '', palace.type || 'standard']);
    }
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(metaRows), 'Meta');

    for (const palace of data.palaces) {
      const rows = [['lokation', 'rækkefølge', 'værelse', 'minde']];
      const sortedLocs = [...palace.locations].sort((a, b) => a.order - b.order);
      for (const loc of sortedLocs) {
        const room = loc.roomId ? (palace.rooms || []).find(r => r.id === loc.roomId) : null;
        if (loc.memories.length === 0) {
          rows.push([loc.name, loc.order, room ? room.name : '', '']);
        } else {
          for (const mem of loc.memories) {
            rows.push([loc.name, loc.order, room ? room.name : '', mem.text]);
          }
        }
      }
      // Excel arknavn max 31 tegn, ingen special-tegn
      const sheetName = palace.name.replace(/[\\/:*?[\]]/g, '_').slice(0, 31);
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), sheetName);
    }
    XLSX.writeFile(wb, 'hukommelsespalads.xlsx');
  }

  function importFromExcel(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const now = Date.now();
        const existingByName = new Map(data.palaces.map(p => [p.name, p]));

        // Læs Meta-ark for beskrivelse og type
        const metaByName = {};
        if (wb.SheetNames.includes('Meta')) {
          for (const row of XLSX.utils.sheet_to_json(wb.Sheets['Meta'], { defval: '' })) {
            const navn = (row['palads'] || '').trim();
            if (navn) metaByName[navn] = { description: (row['beskrivelse'] || '').trim(), type: (row['type'] || '').trim() };
          }
        }

        for (const sheetName of wb.SheetNames.filter(n => n !== 'Meta')) {
          const paladsNavn = sheetName.trim();
          const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: '' });
          const existing = existingByName.get(paladsNavn);

          // Grupér lokationer
          const locMap = new Map();
          for (const row of rows) {
            const lokNavn = (row['lokation'] || '').trim();
            const ordre   = parseInt(row['rækkefølge']) || 0;
            const værelse = (row['værelse'] || '').trim();
            const minde   = (row['minde'] || '').toString().trim();
            if (!lokNavn) continue;
            if (!locMap.has(lokNavn)) locMap.set(lokNavn, { order: ordre, room: værelse, memories: [] });
            if (minde) locMap.get(lokNavn).memories.push(minde);
          }

          // Byg værelsesliste
          const roomNames = new Set([...locMap.values()].map(l => l.room).filter(Boolean));
          let rooms = existing ? [...existing.rooms] : [];
          for (const rName of roomNames) {
            if (!rooms.find(r => r.name === rName)) rooms.push({ id: genId(), name: rName, notes: [] });
          }
          const roomByName = new Map(rooms.map(r => [r.name, r]));

          // Byg lokationsliste
          const locations = [];
          for (const [lokNavn, locData] of locMap) {
            const existingLoc = existing ? existing.locations.find(l => l.name === lokNavn) : null;
            const room = locData.room ? roomByName.get(locData.room) : null;
            const memories = locData.memories.map(text => ({ id: genId(), text, createdAt: now }));
            locations.push({
              id: existingLoc ? existingLoc.id : genId(),
              order: locData.order,
              name: lokNavn,
              memories,
              roomId: room ? room.id : (existingLoc ? existingLoc.roomId : null),
            });
          }
          locations.sort((a, b) => a.order - b.order);

          const meta = metaByName[paladsNavn] || {};
          const importedPalace = {
            id: existing ? existing.id : genId(),
            name: paladsNavn,
            description: meta.description || (existing ? existing.description : ''),
            type: meta.type || (existing ? existing.type : 'standard'),
            createdAt: existing ? existing.createdAt : now,
            rooms,
            locations,
            notes: existing ? existing.notes : [],
            srs: existing ? existing.srs : {
              interval: 1, repetition: 0, efactor: SM2_EF_DEFAULT,
              nextReviewDate: now, lastReviewDate: null, history: []
            },
          };
          // Bevar interne system-felter så initialiseringen ikke duplikerer paladset
          if (existing && existing._histTag) { importedPalace._histTag = existing._histTag; importedPalace._v = existing._v; }
          if (existing && existing.collectionId) importedPalace.collectionId = existing.collectionId;

          const idx = data.palaces.findIndex(p => p.name === paladsNavn);
          if (idx !== -1) data.palaces[idx] = importedPalace;
          else data.palaces.push(importedPalace);
        }

        saveData();
        renderView('dashboard');
        alert('✓ Importeret ' + wb.SheetNames.length + ' palads(er).');
      } catch (err) {
        console.error(err);
        alert('Fejl ved indlæsning: ' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  window.renderView = renderView;

  window.searchPalaces = function(val) {
    app.searchQuery = val;
    renderDashboard();
    const inp = document.getElementById('search-input');
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  };

  window.exportToExcel = function() {
    if (!app.authenticated) { showLoginModal(window.exportToExcel); return; }
    exportToExcel();
  };
  window.triggerExcelImport = function() {
    if (!app.authenticated) { showLoginModal(window.triggerExcelImport); return; }
    document.getElementById('excel-file-input').click();
  };
  window.handleExcelFile = function(input) {
    if (input.files && input.files[0]) { importFromExcel(input.files[0]); input.value = ''; }
  };

  // ── INIT ───────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    updateAuthButton();
    renderView('dashboard');
    loadFromServer();
  });

})();
</script>
