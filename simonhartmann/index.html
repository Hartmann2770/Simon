<!DOCTYPE html>

<head>

  <title>Simon Hartmann</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Open Sans', sans-serif;
      background: #fff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .topbar {
      padding: 28px 48px 0;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #9ca3af;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      padding: 40px 48px 48px;
      columns: 3 280px;
      column-gap: 48px;
    }

    /* ── CATEGORY BLOCK ── */
    .cat {
      break-inside: avoid;
      margin-bottom: 36px;
    }

    .cat-label {
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    /* ── LINK ROWS ── */
    .cat a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 14px;
      transition: color 0.12s;
    }
    .cat a:hover { color: #2E86C1; }

    .cat a img {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.85;
    }

    /* ── FOOTER ── */
    footer {
      padding: 0 48px 32px;
      font-size: 12.5px;
    }

    footer a {
      color: #9ca3af;
      text-decoration: none;
      transition: color 0.12s;
    }
    footer a:hover { color: #1a1a1a; }

    @media (max-width: 640px) {
      main   { padding: 28px 24px 36px; columns: 1; }
      .topbar { padding: 24px 24px 0; }
      footer { padding: 0 24px 28px; }
    }
  </style>
</head>
